<!DOCTYPE html>
<html lang="ru" data-page-title-i18n="expenses.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Расходы</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --warning:#d97706;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      transition:.15s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-light:hover{
      border-color:#cbd5e1;
      background:#f8fafc;
    }

    .btn-success{
      background:var(--success);
      color:#fff;
    }

    .btn-success:hover{
      filter:brightness(.96);
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .btn-danger:hover{
      filter:brightness(.96);
    }

    .btn-warning{
      background:var(--warning);
      color:#fff;
    }

    .btn-warning:hover{
      filter:brightness(.96);
    }

    .btn-small{
      padding:8px 12px;
      font-size:13px;
      border-radius:10px;
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      align-items:end;
    }

    .filters{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    .period-buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn-period.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .form-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
      max-height:68vh;
      border-radius:12px;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:separate;
      border-spacing:0;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
      background:#fff;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 2px 0 #eef1f5;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .badge-expense{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .actions-cell{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    #langSwitcher{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    #langSwitcher button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    @media (max-width: 1180px){
      .form-grid,
      .filters{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width: 980px){
      .form-grid,
      .filters,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }

      .period-buttons{
        display:grid;
        grid-template-columns:repeat(3,1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="expenses.heading">Расходы</div>
      <div class="top-actions">
        <div id="langSwitcher"></div>
        <button class="btn btn-light" onclick="goBack()" data-i18n="expenses.backButton">Назад</button>
        <button class="btn btn-light" onclick="logout()" data-i18n="expenses.logoutButton">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" id="formTitle" data-i18n="expenses.formTitle">Добавить расход</h2>

      <div class="form-grid">
        <div class="field">
          <label for="amountInput" data-i18n="expenses.amountLabel">Сумма</label>
          <input id="amountInput" type="number" min="0.01" step="0.01" placeholder="Например: 1500" data-i18n-placeholder="expenses.amountPlaceholder" />
        </div>

        <div class="field">
          <label for="categoryInput" data-i18n="expenses.categoryLabel">Категория</label>
          <select id="categoryInput">
            <option value="" data-i18n="expenses.categoryEmpty">Выбери категорию</option>
            <option value="rent" data-i18n="expenses.categoryRent">Аренда</option>
            <option value="salary" data-i18n="expenses.categorySalary">Зарплата</option>
            <option value="purchase" data-i18n="expenses.categoryPurchase">Закупка</option>
            <option value="delivery" data-i18n="expenses.categoryDelivery">Доставка</option>
            <option value="ads" data-i18n="expenses.categoryAds">Реклама</option>
            <option value="utilities" data-i18n="expenses.categoryUtilities">Коммунальные</option>
            <option value="other" data-i18n="expenses.categoryOther">Прочее</option>
          </select>
        </div>

        <div class="field">
          <label for="expenseDateInput" data-i18n="expenses.expenseDateLabel">Дата расхода</label>
          <input id="expenseDateInput" type="date" />
        </div>

        <div class="field" style="grid-column:1 / -1;">
          <label for="commentInput" data-i18n="expenses.commentLabel">Комментарий</label>
          <input id="commentInput" type="text" placeholder="Например: аренда контейнера за апрель" data-i18n-placeholder="expenses.commentPlaceholder" />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-success" id="saveBtn" data-i18n="expenses.saveButton">Сохранить расход</button>
        <button type="button" class="btn btn-light" id="clearBtn" data-i18n="expenses.clearButton">Очистить</button>
      </div>

      <div id="formStatus" class="status info"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="expenses.historyTitle">Фильтры и история расходов</h2>

      <div class="filters">
        <div class="field">
          <label for="searchInput" data-i18n="expenses.searchLabel">Поиск по комментарию / категории / пользователю</label>
          <input id="searchInput" type="text" placeholder="Например: аренда, зарплата, admin" data-i18n-placeholder="expenses.searchPlaceholder" />
        </div>

        <div class="field">
          <label for="categoryFilter" data-i18n="expenses.categoryFilterLabel">Категория</label>
          <select id="categoryFilter">
            <option value="" data-i18n="expenses.filterAll">Все</option>
            <option value="rent" data-i18n="expenses.categoryRent">Аренда</option>
            <option value="salary" data-i18n="expenses.categorySalary">Зарплата</option>
            <option value="purchase" data-i18n="expenses.categoryPurchase">Закупка</option>
            <option value="delivery" data-i18n="expenses.categoryDelivery">Доставка</option>
            <option value="ads" data-i18n="expenses.categoryAds">Реклама</option>
            <option value="utilities" data-i18n="expenses.categoryUtilities">Коммунальные</option>
            <option value="other" data-i18n="expenses.categoryOther">Прочее</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="expenses.quickPeriodLabel">Быстрый период</label>
          <div class="period-buttons">
            <button type="button" class="btn btn-light btn-period" id="periodTodayBtn" data-i18n="expenses.periodToday">Сегодня</button>
            <button type="button" class="btn btn-light btn-period" id="periodWeekBtn" data-i18n="expenses.periodWeek">Неделя</button>
            <button type="button" class="btn btn-light btn-period" id="periodMonthBtn" data-i18n="expenses.periodMonth">Месяц</button>
          </div>
        </div>

        <div class="field">
          <label for="dateFrom" data-i18n="expenses.dateFromLabel">Дата от</label>
          <input id="dateFrom" type="date" />
        </div>

        <div class="field">
          <label for="dateTo" data-i18n="expenses.dateToLabel">Дата до</label>
          <input id="dateTo" type="date" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button type="button" class="btn btn-primary" id="refreshBtn" data-i18n="expenses.refreshButton">Обновить</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="expenses.statsRows">Записей</div>
          <div class="stat-value" id="rowsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="expenses.statsTotal">Сумма расходов</div>
          <div class="stat-value" id="expenseTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="expenses.statsAverage">Средний расход</div>
          <div class="stat-value" id="avgExpense">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Максимальный расход</div>
          <div class="stat-value" id="maxExpense">0</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th data-i18n="expenses.tableType">Тип</th>
              <th data-i18n="expenses.tableAmount">Сумма</th>
              <th data-i18n="expenses.tableCategory">Категория</th>
              <th data-i18n="expenses.tableComment">Комментарий</th>
              <th data-i18n="expenses.tableCreatedBy">Создал</th>
              <th>Дата расхода</th>
              <th data-i18n="expenses.tableDate">Создан</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="9" class="empty" data-i18n="expenses.loadingRows">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const FALLBACK_TENANT_ID = 1;

    const CATEGORY_LABELS = {
      rent: "Аренда",
      salary: "Зарплата",
      purchase: "Закупка",
      delivery: "Доставка",
      ads: "Реклама",
      utilities: "Коммунальные",
      other: "Прочее"
    };

    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const authToken = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(authToken ? { Authorization: "Bearer " + authToken } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      },
      put(path, body) {
        if (window.API && typeof window.API.put === "function") {
          return window.API.put(path, body);
        }
        return requestFallback("PUT", path, body);
      },
      delete(path) {
        if (window.API && typeof window.API.delete === "function") {
          return window.API.delete(path);
        }
        return requestFallback("DELETE", path);
      }
    };

    let authUser = null;
    let expensesData = [];
    let activePeriod = "";
    let editingExpenseId = null;

    const els = {
      formTitle: document.getElementById("formTitle"),
      amountInput: document.getElementById("amountInput"),
      categoryInput: document.getElementById("categoryInput"),
      expenseDateInput: document.getElementById("expenseDateInput"),
      commentInput: document.getElementById("commentInput"),
      saveBtn: document.getElementById("saveBtn"),
      clearBtn: document.getElementById("clearBtn"),
      formStatus: document.getElementById("formStatus"),

      searchInput: document.getElementById("searchInput"),
      categoryFilter: document.getElementById("categoryFilter"),
      dateFrom: document.getElementById("dateFrom"),
      dateTo: document.getElementById("dateTo"),
      periodTodayBtn: document.getElementById("periodTodayBtn"),
      periodWeekBtn: document.getElementById("periodWeekBtn"),
      periodMonthBtn: document.getElementById("periodMonthBtn"),
      refreshBtn: document.getElementById("refreshBtn"),

      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      rowsCount: document.getElementById("rowsCount"),
      expenseTotal: document.getElementById("expenseTotal"),
      avgExpense: document.getElementById("avgExpense"),
      maxExpense: document.getElementById("maxExpense")
    };

    function t(key) {
      return window.i18n ? window.i18n.t(key) : key;
    }

    function tf(key, vars) {
      return window.i18n ? window.i18n.format(key, vars) : key;
    }

    function tt(key, fallback) {
      const value = t(key);
      return value === key ? fallback : value;
    }

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== "") {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(FALLBACK_TENANT_ID);
    }

    function showStatus(el, text, type = "info") {
      el.className = "status show " + type;
      el.textContent = text;
    }

    function hideStatus(el) {
      el.className = "status";
      el.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n.toLocaleString("ru-RU", {
        minimumFractionDigits: n % 1 === 0 ? 0 : 2,
        maximumFractionDigits: 2
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleDateString("ru-RU");
    }

    function formatDateTime(value) {
      return Ui.displayDateTime(value);
    }

    function categoryLabel(value) {
      const key = String(value || "").trim().toLowerCase();
      if (key === "rent") return t("expenses.categoryRent") !== "expenses.categoryRent" ? t("expenses.categoryRent") : "Аренда";
      if (key === "salary") return t("expenses.categorySalary") !== "expenses.categorySalary" ? t("expenses.categorySalary") : "Зарплата";
      if (key === "purchase") return t("expenses.categoryPurchase") !== "expenses.categoryPurchase" ? t("expenses.categoryPurchase") : "Закупка";
      if (key === "delivery") return t("expenses.categoryDelivery") !== "expenses.categoryDelivery" ? t("expenses.categoryDelivery") : "Доставка";
      if (key === "ads") return t("expenses.categoryAds") !== "expenses.categoryAds" ? t("expenses.categoryAds") : "Реклама";
      if (key === "utilities") return t("expenses.categoryUtilities") !== "expenses.categoryUtilities" ? t("expenses.categoryUtilities") : "Коммунальные";
      if (key === "other") return t("expenses.categoryOther") !== "expenses.categoryOther" ? t("expenses.categoryOther") : "Прочее";
      return CATEGORY_LABELS[key] || value || "";
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function setDefaultExpenseDate() {
      els.expenseDateInput.value = toDateInputValue(new Date());
    }

    function setActivePeriod(period) {
      activePeriod = period;
      els.periodTodayBtn.classList.toggle("active", period === "today");
      els.periodWeekBtn.classList.toggle("active", period === "week");
      els.periodMonthBtn.classList.toggle("active", period === "month");
    }

    function setPeriod(period) {
      const now = new Date();
      const todayValue = toDateInputValue(now);

      if (period === "today") {
        els.dateFrom.value = todayValue;
        els.dateTo.value = todayValue;
      } else if (period === "week") {
        const from = new Date(now);
        from.setDate(from.getDate() - 6);
        els.dateFrom.value = toDateInputValue(from);
        els.dateTo.value = todayValue;
      } else if (period === "month") {
        const from = new Date(now);
        from.setMonth(from.getMonth() - 1);
        els.dateFrom.value = toDateInputValue(from);
        els.dateTo.value = todayValue;
      }

      setActivePeriod(period);
      renderTable();
    }

    function clearActivePeriod() {
      setActivePeriod("");
    }

    function isInDateRange(row) {
      const from = els.dateFrom.value;
      const to = els.dateTo.value;

      if (!from && !to) return true;
      if (!row.expense_date) return false;

      const rowDate = new Date(`${row.expense_date}T12:00:00`);
      if (Number.isNaN(rowDate.getTime())) return false;

      if (from) {
        const fromDate = new Date(`${from}T00:00:00`);
        if (rowDate < fromDate) return false;
      }

      if (to) {
        const toDate = new Date(`${to}T23:59:59.999`);
        if (rowDate > toDate) return false;
      }

      return true;
    }

    function normalizeExpenseRow(row) {
      return {
        id: row.id,
        tenant_id: row.tenant_id,
        amount: Number(row.amount || 0),
        category: String(row.category || "").trim().toLowerCase(),
        category_label: row.category_label || CATEGORY_LABELS[String(row.category || "").trim().toLowerCase()] || "",
        comment: row.comment || "",
        expense_date: row.expense_date || "",
        created_by_username: row.created_by_username || "",
        created_at: row.created_at || null,
        updated_at: row.updated_at || null
      };
    }

    function setEditMode(row) {
      editingExpenseId = row.id;
      els.formTitle.textContent = `${tt("expenses.formEditTitle", "Редактирование расхода")} #${row.id}`;
      els.saveBtn.textContent = tt("expenses.updateButton", "Сохранить изменения");
      els.amountInput.value = row.amount;
      els.categoryInput.value = row.category || "";
      els.expenseDateInput.value = row.expense_date || "";
      els.commentInput.value = row.comment || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearForm() {
      editingExpenseId = null;
      els.formTitle.textContent = tt("expenses.formTitle", "Добавить расход");
      els.saveBtn.textContent = tt("expenses.saveButton", "Сохранить расход");
      els.amountInput.value = "";
      els.categoryInput.value = "";
      setDefaultExpenseDate();
      els.commentInput.value = "";
      hideStatus(els.formStatus);
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      const category = (els.categoryFilter.value || "").trim().toLowerCase();

      return expensesData
        .filter(row => !category || row.category === category)
        .filter(row => isInDateRange(row))
        .filter(row => {
          if (!search) return true;

          const text = [
            categoryLabel(row.category),
            row.comment,
            row.created_by_username,
            row.expense_date
          ].join(" ").toLowerCase();

          return text.includes(search);
        });
    }

    function updateStats(rows) {
      const total = rows.reduce((sum, row) => sum + Number(row.amount || 0), 0);
      const average = rows.length ? total / rows.length : 0;
      const max = rows.length ? Math.max(...rows.map(row => Number(row.amount || 0))) : 0;

      els.rowsCount.textContent = String(rows.length);
      els.expenseTotal.textContent = formatMoney(total);
      els.avgExpense.textContent = formatMoney(average);
      els.maxExpense.textContent = formatMoney(max);
    }

    function renderTable() {
      const rows = getFilteredRows();
      updateStats(rows);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${escapeHtml(tt("expenses.noData", "Нет данных"))}</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.id)}</td>
          <td><span class="badge badge-expense">${escapeHtml(tt("expenses.badgeExpense", "Расход"))}</span></td>
          <td>${escapeHtml(formatMoney(row.amount))}</td>
          <td>${escapeHtml(categoryLabel(row.category))}</td>
          <td>${escapeHtml(row.comment)}</td>
          <td>${escapeHtml(row.created_by_username || tt("expenses.noUser", "—"))}</td>
          <td>${escapeHtml(formatDate(row.expense_date))}</td>
          <td>${escapeHtml(formatDateTime(row.created_at))}</td>
          <td>
            <div class="actions-cell">
              <button type="button" class="btn btn-warning btn-small" onclick="editExpense('${String(row.id).replace(/'/g, "\\'")}')">${escapeHtml(tt("expenses.editButton", "Изменить"))}</button>
              <button type="button" class="btn btn-danger btn-small" onclick="deleteExpense('${String(row.id).replace(/'/g, "\\'")}')">${escapeHtml(tt("expenses.deleteButton", "Удалить"))}</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        showStatus(els.pageStatus, tf("expenses.loadingStatus", { tenantId }), "info");

        const data = await ApiBridge.get(`/expenses?tenant_id=${tenantId}`);
        expensesData = extractList(data, ["expenses", "data", "rows"]).map(normalizeExpenseRow);

        renderTable();

        showStatus(
          els.pageStatus,
          tf("expenses.loadedStatus", { tenantId, count: expensesData.length }),
          "success"
        );
      } catch (err) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${escapeHtml(tt("expenses.loadErrorRow", "Ошибка загрузки данных"))}</td>
          </tr>
        `;
        showStatus(els.pageStatus, tf("expenses.loadErrorStatus", { error: Ui.translateError(err.message) }), "error");
      }
    }

    async function saveExpense() {
      try {
        const tenantId = getTenantId();
        const amount = Number(els.amountInput.value || 0);
        const category = String(els.categoryInput.value || "").trim();
        const expenseDate = String(els.expenseDateInput.value || "").trim();
        const comment = String(els.commentInput.value || "").trim();

        if (!Number.isFinite(amount) || amount <= 0) {
          throw new Error(tt("expenses.amountInvalid", "Некорректная сумма"));
        }

        if (!category) {
          throw new Error(tt("expenses.categoryRequired", "Выбери категорию"));
        }

        if (!expenseDate) {
          throw new Error(tt("expenses.expenseDateRequired", "Укажи дату расхода"));
        }

        showStatus(
          els.formStatus,
          editingExpenseId
            ? tt("expenses.updatingStatus", "Обновление расхода...")
            : tt("expenses.savingStatus", "Сохранение расхода..."),
          "info"
        );

        if (editingExpenseId) {
          await ApiBridge.put(`/expenses/${editingExpenseId}`, {
            amount,
            category,
            expense_date: expenseDate,
            comment: comment || null
          });
        } else {
          await ApiBridge.post("/expenses", {
            tenant_id: tenantId,
            amount,
            category,
            expense_date: expenseDate,
            comment: comment || null
          });
        }

        showStatus(
          els.formStatus,
          editingExpenseId
            ? tt("expenses.updatedStatus", "Расход обновлён")
            : tt("expenses.savedStatus", "Расход сохранён"),
          "success"
        );

        clearForm();
        await loadData();
      } catch (err) {
        showStatus(els.formStatus, tf("expenses.saveErrorStatus", { error: Ui.translateError(err.message) }), "error");
      }
    }

    async function removeExpense(id) {
      const ok = window.confirm(tt("expenses.deleteConfirm", "Удалить этот расход?"));
      if (!ok) return;

      try {
        showStatus(els.pageStatus, tt("expenses.deletingStatus", "Удаление расхода..."), "info");
        await ApiBridge.delete(`/expenses/${id}`);

        if (String(editingExpenseId) === String(id)) {
          clearForm();
        }

        await loadData();
        showStatus(els.pageStatus, tt("expenses.deletedStatus", "Расход удалён"), "success");
      } catch (err) {
        showStatus(els.pageStatus, tf("expenses.deleteErrorStatus", { error: Ui.translateError(err.message) }), "error");
      }
    }

    window.editExpense = function(id) {
      const row = expensesData.find(item => String(item.id) === String(id));
      if (!row) {
        showStatus(els.pageStatus, tt("expenses.rowNotFound", "Запись не найдена"), "error");
        return;
      }
      setEditMode(row);
    };

    window.deleteExpense = function(id) {
      removeExpense(id);
    };

    function bindEvents() {
      els.saveBtn.addEventListener("click", saveExpense);
      els.clearBtn.addEventListener("click", clearForm);

      els.searchInput.addEventListener("input", renderTable);
      els.categoryFilter.addEventListener("change", renderTable);

      els.dateFrom.addEventListener("change", () => {
        clearActivePeriod();
        renderTable();
      });

      els.dateTo.addEventListener("change", () => {
        clearActivePeriod();
        renderTable();
      });

      els.periodTodayBtn.addEventListener("click", () => setPeriod("today"));
      els.periodWeekBtn.addEventListener("click", () => setPeriod("week"));
      els.periodMonthBtn.addEventListener("click", () => setPeriod("month"));

      els.refreshBtn.addEventListener("click", loadData);

      document.addEventListener("app:language-changed", () => {
        if (window.i18n) {
          window.i18n.applyTranslations();
          window.i18n.renderLanguageSwitcher("langSwitcher");
        }

        if (editingExpenseId) {
          const row = expensesData.find(item => String(item.id) === String(editingExpenseId));
          if (row) {
            els.formTitle.textContent = `${tt("expenses.formEditTitle", "Редактирование расхода")} #${row.id}`;
            els.saveBtn.textContent = tt("expenses.updateButton", "Сохранить изменения");
          }
        } else {
          els.formTitle.textContent = tt("expenses.formTitle", "Добавить расход");
          els.saveBtn.textContent = tt("expenses.saveButton", "Сохранить расход");
        }

        renderTable();
      });
    }

    function bootstrap() {
      parseUser();
      setDefaultExpenseDate();
      bindEvents();
      if (window.i18n) {
        window.i18n.applyTranslations();
        window.i18n.renderLanguageSwitcher("langSwitcher");
      }
      loadData();
    }

    bootstrap();
  </script>
</body>
</html>
