<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="clients_page_title">BFC24 CONTROL — Клиенты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      outline:none;
    }

    .lang-switcher{
      display:flex;
      gap:6px;
    }

    .lang-btn{
      padding:6px 10px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      background:#eef2f7;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
    }

    .lang-btn.active{
      background:#2563eb;
      color:#fff;
    }
  </style>
</head>

<body>

<div class="wrap notranslate">

  <div class="topbar">
    <div class="title" data-i18n="clients_title">Клиенты</div>

    <div class="top-actions">
      <div id="langSwitcher" class="lang-switcher"></div>
      <button class="btn btn-light" onclick="location.href='/index.html'" data-i18n="back">Назад</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="clients_add">Добавить клиента</div>

    <div class="form-grid">
      <div class="field">
        <label data-i18n="clients_name">Имя</label>
        <input id="name" />
      </div>

      <div class="field">
        <label data-i18n="clients_phone">Телефон</label>
        <input id="phone" />
      </div>

      <div class="field full">
        <label data-i18n="clients_comment">Комментарий</label>
        <textarea id="comment"></textarea>
      </div>
    </div>

    <div style="margin-top:16px;">
      <button class="btn btn-primary" onclick="createClient()" data-i18n="save">Сохранить</button>
    </div>
  </div>

</div>

<script src="/js/i18n.js"></script>

<script>
i18n.applyTranslations();
i18n.renderLanguageSwitcher("langSwitcher");
</script>

</body>
</html>
