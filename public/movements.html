<!DOCTYPE html>
<html lang="ru" translate="no" data-page-title-i18n="movements.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Движения товара</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --warning:#d97706;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .lang-switcher{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .lang-switcher button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      min-width:56px;
    }

    .lang-switcher button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-quick{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
    }

    .btn-quick:hover{
      border-color:#b8c4d9;
      background:#f8fafc;
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .filters{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .quick-range{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
    }

    table{
      width:100%;
      min-width:1250px;
      border-collapse:collapse;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .badge-receipt{
      color:#166534;
      background:#f0fdf4;
      border-color:#bbf7d0;
    }

    .badge-sale{
      color:#1d4ed8;
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .badge-writeoff{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .badge-adjustment{
      color:#92400e;
      background:#fff7ed;
      border-color:#fed7aa;
    }

    .badge-transfer{
      color:#5b21b6;
      background:#f5f3ff;
      border-color:#ddd6fe;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    @media (max-width: 1100px){
      .filters,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }

      .topbar{
        align-items:flex-start;
      }

      .topbar-right{
        width:100%;
        justify-content:space-between;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="movements.heading">Движения товара</div>

      <div class="topbar-right">
        <div id="langSwitcher" class="lang-switcher"></div>

        <div class="top-actions">
          <button class="btn btn-light" onclick="goBack()" data-i18n="movements.backButton">Назад</button>
          <button class="btn btn-light" onclick="logout()" data-i18n="movements.logoutButton">Выйти</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="movements.filtersTitle">Фильтры</h2>

      <div class="filters">
        <div class="field">
          <label for="searchInput" data-i18n="movements.searchLabel">Поиск по товару / SKU / МХ / комментарию / пользователю</label>
          <input id="searchInput" type="text" data-i18n-placeholder="movements.searchPlaceholder" placeholder="Например: Кабель, SKU-001, Контейнер 1, admin" />
        </div>

        <div class="field">
          <label for="typeFilter" data-i18n="movements.typeFilterLabel">Тип движения</label>
          <select id="typeFilter">
            <option value="" data-i18n="movements.typeAll">Все</option>
            <option value="receipt" data-i18n="movements.typeReceipt">Приёмка</option>
            <option value="sale" data-i18n="movements.typeSale">Продажа</option>
            <option value="writeoff" data-i18n="movements.typeWriteoff">Списание</option>
            <option value="adjustment" data-i18n="movements.typeAdjustment">Корректировка</option>
            <option value="transfer_in" data-i18n="movements.typeTransferIn">Перемещение вход</option>
            <option value="transfer_out" data-i18n="movements.typeTransferOut">Перемещение выход</option>
          </select>
        </div>

        <div class="field">
          <label for="dateFrom" data-i18n="movements.dateFromLabel">Дата с</label>
          <input id="dateFrom" type="date" />
        </div>

        <div class="field">
          <label for="dateTo" data-i18n="movements.dateToLabel">Дата по</label>
          <input id="dateTo" type="date" />
        </div>

        <div class="field">
          <label data-i18n="movements.actionsLabel">&nbsp;</label>
          <button type="button" class="btn btn-primary" id="refreshBtn" data-i18n="movements.refreshButton">Обновить</button>
        </div>
      </div>

      <div class="quick-range">
        <button type="button" class="btn-quick" onclick="setToday()" data-i18n="movements.quickToday">Сегодня</button>
        <button type="button" class="btn-quick" onclick="setLastDays(7)" data-i18n="movements.quick7days">7 дней</button>
        <button type="button" class="btn-quick" onclick="setLastDays(30)" data-i18n="movements.quick30days">30 дней</button>
        <button type="button" class="btn-quick" onclick="setCurrentMonth()" data-i18n="movements.quickCurrentMonth">Этот месяц</button>
        <button type="button" class="btn-quick" onclick="clearDates()" data-i18n="movements.quickAllTime">Всё время</button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="movements.statsRows">Записей</div>
          <div class="stat-value" id="rowsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="movements.statsReceipt">Приёмок</div>
          <div class="stat-value" id="receiptCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="movements.statsSale">Продаж</div>
          <div class="stat-value" id="saleCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="movements.statsWriteoff">Списаний</div>
          <div class="stat-value" id="writeoffCount">0</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="movements.historyTitle">История движений</h2>
      <div class="muted" data-i18n="movements.historySubtitle">Показываются движения товаров по складу и операциям.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="movements.tableId">ID</th>
              <th data-i18n="movements.tableType">Тип</th>
              <th data-i18n="movements.tableItem">Товар</th>
              <th data-i18n="movements.tableSku">SKU</th>
              <th data-i18n="movements.tableLocation">МХ</th>
              <th data-i18n="movements.tableQty">Кол-во</th>
              <th data-i18n="movements.tableComment">Комментарий</th>
              <th data-i18n="movements.tableUser">Пользователь</th>
              <th data-i18n="movements.tableDate">Дата</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="9" class="empty" data-i18n="movements.loadingRows">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const token = localStorage.getItem("token");
    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }
    };

    async function requestFallback(method, path, body) {
      const token = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: "Bearer " + token } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      },
      put(path, body) {
        if (window.API && typeof window.API.put === "function") {
          return window.API.put(path, body);
        }
        return requestFallback("PUT", path, body);
      },
      patch(path, body) {
        if (window.API && typeof window.API.patch === "function") {
          return window.API.patch(path, body);
        }
        return requestFallback("PATCH", path, body);
      },
      delete(path) {
        if (window.API && typeof window.API.delete === "function") {
          return window.API.delete(path);
        }
        return requestFallback("DELETE", path);
      }
    };

    if (!token) {
      window.location.href = "/login.html";
    }

    let movementsData = [];
    let pageStatusState = null;

    const els = {
      searchInput: document.getElementById("searchInput"),
      typeFilter: document.getElementById("typeFilter"),
      dateFrom: document.getElementById("dateFrom"),
      dateTo: document.getElementById("dateTo"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      rowsCount: document.getElementById("rowsCount"),
      receiptCount: document.getElementById("receiptCount"),
      saleCount: document.getElementById("saleCount"),
      writeoffCount: document.getElementById("writeoffCount")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function showStatus(text, type = "info") {
      els.pageStatus.className = "status show " + type;
      els.pageStatus.textContent = text;
    }

    function setPageStatus(key, vars, type) {
      pageStatusState = { key, vars: vars || {}, type };
      showStatus(i18n.format(key, vars || {}), type);
    }

    function restoreStatusesAfterLanguageChange() {
      if (pageStatusState) {
        showStatus(i18n.format(pageStatusState.key, pageStatusState.vars || {}), pageStatusState.type);
      }
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    function formatNumber(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function formatDate(value) {
      if (!value) return "";
      return Ui.displayDateTime(value);
    }

    function movementBadge(type) {
      if (type === "receipt") return `<span class="badge badge-receipt">${Ui.escapeHtml(i18n.t("movements.badgeReceipt"))}</span>`;
      if (type === "sale") return `<span class="badge badge-sale">${Ui.escapeHtml(i18n.t("movements.badgeSale"))}</span>`;
      if (type === "writeoff") return `<span class="badge badge-writeoff">${Ui.escapeHtml(i18n.t("movements.badgeWriteoff"))}</span>`;
      if (type === "adjustment") return `<span class="badge badge-adjustment">${Ui.escapeHtml(i18n.t("movements.badgeAdjustment"))}</span>`;
      if (type === "transfer_in") return `<span class="badge badge-transfer">${Ui.escapeHtml(i18n.t("movements.badgeTransferIn"))}</span>`;
      if (type === "transfer_out") return `<span class="badge badge-transfer">${Ui.escapeHtml(i18n.t("movements.badgeTransferOut"))}</span>`;
      return Ui.escapeHtml(type || "");
    }

    function normalizeMovement(row) {
      return {
        id: row.id,
        movement_type: row.movement_type || "",
        item_name: row.item_name || "",
        sku: row.sku || "",
        location_name: row.location_name || "",
        qty: Number(row.qty ?? 0),
        comment: row.comment || "",
        user_name: row.user_name || row.created_by_username || "",
        created_at: row.created_at || null
      };
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      const type = els.typeFilter.value;

      return movementsData
        .filter(row => !type || row.movement_type === type)
        .filter(row => {
          if (!search) return true;

          const text = [
            row.item_name,
            row.sku,
            row.location_name,
            row.comment,
            row.user_name,
            row.movement_type
          ].join(" ").toLowerCase();

          return text.includes(search);
        });
    }

    function updateStats(rows) {
      els.rowsCount.textContent = String(rows.length);
      els.receiptCount.textContent = String(rows.filter(r => r.movement_type === "receipt").length);
      els.saleCount.textContent = String(rows.filter(r => r.movement_type === "sale").length);
      els.writeoffCount.textContent = String(rows.filter(r => r.movement_type === "writeoff").length);
    }

    function renderTable() {
      const rows = getFilteredRows();
      updateStats(rows);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${Ui.escapeHtml(i18n.t("movements.noData"))}</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${Ui.escapeHtml(row.id)}</td>
          <td>${movementBadge(row.movement_type)}</td>
          <td>${Ui.escapeHtml(row.item_name || i18n.t("movements.noName"))}</td>
          <td>${Ui.escapeHtml(row.sku)}</td>
          <td>${Ui.escapeHtml(row.location_name)}</td>
          <td>${Ui.escapeHtml(formatNumber(row.qty))}</td>
          <td>${Ui.escapeHtml(row.comment)}</td>
          <td>${Ui.escapeHtml(row.user_name || i18n.t("movements.noUser"))}</td>
          <td>${Ui.escapeHtml(formatDate(row.created_at))}</td>
        </tr>
      `).join("");
    }

    function buildQuery() {
      const params = new URLSearchParams();
      params.set("tenant_id", ApiBridge.getTenantId());

      if (els.typeFilter.value) {
        params.set("type", els.typeFilter.value);
      }

      if (els.dateFrom.value) {
        params.set("date_from", els.dateFrom.value);
      }

      if (els.dateTo.value) {
        params.set("date_to", els.dateTo.value);
      }

      return params.toString();
    }

    async function loadData() {
      try {
        const tenantId = ApiBridge.getTenantId();
        setPageStatus("movements.loadingStatus", { tenantId }, "info");

        const data = await ApiBridge.get(`/stock/movements?${buildQuery()}`);
        movementsData = extractList(data, ["movements", "data", "rows"]).map(normalizeMovement);

        renderTable();

        setPageStatus("movements.loadedStatus", {
          tenantId,
          count: movementsData.length
        }, "success");
      } catch (err) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${Ui.escapeHtml(i18n.t("movements.loadErrorRow"))}</td>
          </tr>
        `;
        setPageStatus("movements.loadErrorStatus", {
          error: Ui.translateError(err.message)
        }, "error");
      }
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function toDateInputValue(date) {
      const y = date.getFullYear();
      const m = pad2(date.getMonth() + 1);
      const d = pad2(date.getDate());
      return `${y}-${m}-${d}`;
    }

    function setToday() {
      const today = new Date();
      const value = toDateInputValue(today);
      els.dateFrom.value = value;
      els.dateTo.value = value;
      loadData();
    }

    function setLastDays(days) {
      const today = new Date();
      const from = new Date();
      from.setDate(today.getDate() - (days - 1));

      els.dateFrom.value = toDateInputValue(from);
      els.dateTo.value = toDateInputValue(today);
      loadData();
    }

    function setCurrentMonth() {
      const today = new Date();
      const from = new Date(today.getFullYear(), today.getMonth(), 1);

      els.dateFrom.value = toDateInputValue(from);
      els.dateTo.value = toDateInputValue(today);
      loadData();
    }

    function clearDates() {
      els.dateFrom.value = "";
      els.dateTo.value = "";
      loadData();
    }

    function bindEvents() {
      els.searchInput.addEventListener("input", renderTable);
      els.typeFilter.addEventListener("change", loadData);
      els.dateFrom.addEventListener("change", loadData);
      els.dateTo.addEventListener("change", loadData);
      els.refreshBtn.addEventListener("click", loadData);

      document.addEventListener("app:language-changed", () => {
        i18n.applyTranslations();
        renderTable();
        restoreStatusesAfterLanguageChange();
      });
    }

    function bootstrap() {
      i18n.applyTranslations();
      i18n.renderLanguageSwitcher("langSwitcher");
      bindEvents();
      loadData();
    }

    bootstrap();

    window.goBack = goBack;
    window.logout = logout;
    window.setToday = setToday;
    window.setLastDays = setLastDays;
    window.setCurrentMonth = setCurrentMonth;
    window.clearDates = clearDates;
  </script>
</body>
</html>
