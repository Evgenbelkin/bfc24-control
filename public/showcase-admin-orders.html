<!DOCTYPE html>
<html lang="ru" data-page-title-i18n="showcaseAdminOrders.pageTitle">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заказы витрины — BFC24 CONTROL</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#e6ebf2;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --warning:#d97706;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    .wrap{
      max-width:1600px;
      margin:0 auto;
      padding:24px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .title h1{
      margin:0 0 6px 0;
      font-size:28px;
      line-height:1.2;
    }

    .title p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
      transition:.15s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:40px;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-2)}
    .btn-light{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn-light:hover{background:#f8fafc}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-warning{background:var(--warning);color:#fff}
    .btn-small{padding:8px 10px;font-size:13px;min-height:34px}
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none!important;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .message{
      margin:0 0 16px 0;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:14px;
      font-weight:700;
    }

    .message.show{display:block}
    .message.info{background:#dbeafe;color:#1d4ed8}
    .message.error{background:#fee2e2;color:#b91c1c}
    .message.success{background:#dcfce7;color:#15803d}

    .filters{
      padding:18px;
      margin-bottom:18px;
    }

    .filters-row{
      display:grid;
      grid-template-columns:1.2fr .8fr .7fr .6fr .6fr;
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      display:block;
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:0 12px;
      font-size:14px;
      color:var(--text);
      outline:none;
    }

    .field input,
    .field select{height:40px}

    .field textarea{
      min-height:86px;
      padding:12px;
      resize:vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(37,99,235,.10);
    }

    .table-card{
      overflow:hidden;
    }

    .orders-table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:1180px;
    }

    thead th{
      background:#f8fafc;
      color:var(--muted);
      text-align:left;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:1;
    }

    tbody td{
      padding:12px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      vertical-align:middle;
      background:#fff;
    }

    tbody tr.order-row:hover td{
      background:#fafcff;
    }

    tbody tr.order-row.active td{
      background:#eff6ff;
    }

    .details-row td{
      padding:0;
      background:#f8fafc;
    }

    .order-details{
      padding:18px;
      border-bottom:1px solid var(--line);
      background:#f8fafc;
    }

    .details-head{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .details-title h3{
      margin:0 0 6px 0;
      font-size:20px;
    }

    .details-title p{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    .details-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .line-table{
      width:100%;
      min-width:1100px;
      border-collapse:separate;
      border-spacing:0;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
    }

    .line-table th{
      position:static;
      background:#fff;
      border-bottom:1px solid var(--line);
    }

    .line-table td{
      background:#fff;
      border-bottom:1px solid var(--line);
    }

    .line-table tr:last-child td{
      border-bottom:none;
    }

    .line-row.done td{
      background:#dcfce7;
    }

    .line-row.partial td{
      background:#fef3c7;
    }

    .line-row.missing td{
      background:#fee2e2;
    }

    .line-row.new td{
      background:#fff;
    }

    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:118px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .s-new{background:#eef2f7;color:#475569}
    .s-in_progress{background:#dbeafe;color:#1d4ed8}
    .s-partially_picked{background:#fef3c7;color:#b45309}
    .s-ready{background:#dcfce7;color:#15803d}
    .s-completed{background:#dbeafe;color:#1d4ed8}
    .s-cancelled{background:#fee2e2;color:#b91c1c}
    .s-approved{background:#e0f2fe;color:#0369a1}
    .s-picked{background:#dcfce7;color:#15803d}
    .s-partial{background:#fef3c7;color:#b45309}

    .product-cell{
      display:flex;
      gap:12px;
      align-items:center;
      min-width:280px;
    }

    .product-img{
      width:64px;
      height:64px;
      min-width:64px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#f8fafc;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .product-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .product-img-empty{
      color:var(--muted);
      font-size:11px;
      text-align:center;
      padding:5px;
    }

    .product-name{
      font-weight:800;
      margin-bottom:4px;
      line-height:1.35;
    }

    .product-meta{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .qty-input,
    .price-input{
      width:100%;
      max-width:110px;
      height:38px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 10px;
      font-size:14px;
      background:#fff;
    }

    .line-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      min-width:220px;
    }

    .summary-box{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .summary-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .summary-item .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:5px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .summary-item .value{
      font-size:16px;
      font-weight:800;
    }

    .empty{
      padding:26px 14px;
      color:var(--muted);
      text-align:center;
      font-size:14px;
    }

    .pagination{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
      padding:14px 18px;
    }

    .mono{font-family:Consolas,Menlo,monospace}
    .muted{color:var(--muted)}
    .nowrap{white-space:nowrap}

    #langSwitcher{display:flex;gap:8px;flex-wrap:wrap;}
    #langSwitcher button.active{background:var(--primary);color:#fff;border-color:var(--primary);}

    @media (max-width: 1000px){
      .filters-row{grid-template-columns:1fr 1fr}
      .summary-box{grid-template-columns:1fr 1fr}
    }

    @media (max-width: 700px){
      .wrap{padding:14px}
      .filters-row{grid-template-columns:1fr}
      .summary-box{grid-template-columns:1fr}
      .title h1{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1 data-i18n="showcaseAdminOrders.heading">Заказы витрины</h1>
        <p data-i18n="showcaseAdminOrders.subtitle">Рабочий экран продавца: взять заказ, собрать позиции, отметить готовым и провести продажу.</p>
      </div>
      <div class="actions">
        <div id="langSwitcher"></div>
        <a class="btn btn-light" href="/index.html" data-i18n="showcaseAdminOrders.mainMenuButton">← Главное меню</a>
        <a class="btn btn-light" href="/showcase.html" data-i18n="showcaseAdminOrders.openShowcaseButton">Открыть витрину</a>
        <a class="btn btn-light" href="/showcase-settings.html" data-i18n="showcaseAdminOrders.settingsButton">Настройки витрины</a>
        <button class="btn btn-primary" id="btnReloadTop" type="button" data-i18n="showcaseAdminOrders.refreshButton">Обновить</button>
      </div>
    </div>

    <div class="message info" id="messageBox"></div>

    <div class="card filters">
      <div class="filters-row">
        <div class="field">
          <label for="searchInput" data-i18n="showcaseAdminOrders.searchLabel">Поиск</label>
          <input id="searchInput" type="text" placeholder="Номер заказа, покупатель, телефон" data-i18n-placeholder="showcaseAdminOrders.searchPlaceholder" />
        </div>

        <div class="field">
          <label for="statusSelect" data-i18n="showcaseAdminOrders.statusLabel">Статус</label>
          <select id="statusSelect">
            <option value="" data-i18n="showcaseAdminOrders.allStatusesOption">Все статусы</option>
            <option value="new" data-i18n="showcaseAdminOrders.statusNew">Новый</option>
            <option value="in_progress" data-i18n="showcaseAdminOrders.statusInProgress">В работе</option>
            <option value="partially_picked" data-i18n="showcaseAdminOrders.statusPartiallyPicked">Частично собран</option>
            <option value="ready" data-i18n="showcaseAdminOrders.statusReady">Готов</option>
            <option value="completed" data-i18n="showcaseAdminOrders.statusCompletedSale">Продажа проведена</option>
            <option value="cancelled" data-i18n="showcaseAdminOrders.statusCancelled">Отменён</option>
          </select>
        </div>

        <div class="field">
          <label for="limitSelect" data-i18n="showcaseAdminOrders.limitLabel">На странице</label>
          <select id="limitSelect">
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="btnApplyFilters" type="button" style="width:100%;" data-i18n="showcaseAdminOrders.showButton">Показать</button>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button class="btn btn-light" id="btnClearFilters" type="button" style="width:100%;" data-i18n="showcaseAdminOrders.resetButton">Сбросить</button>
        </div>
      </div>
    </div>

    <div class="card table-card">
      <div class="orders-table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th data-i18n="showcaseAdminOrders.tableOrder">Заказ</th>
              <th data-i18n="showcaseAdminOrders.tableBuyer">Покупатель</th>
              <th data-i18n="showcaseAdminOrders.tablePhone">Телефон</th>
              <th data-i18n="showcaseAdminOrders.tableStatus">Статус</th>
              <th data-i18n="showcaseAdminOrders.tableQty">Кол-во</th>
              <th data-i18n="showcaseAdminOrders.tableLines">Строк</th>
              <th data-i18n="showcaseAdminOrders.tableDate">Дата</th>
              <th data-i18n="showcaseAdminOrders.tableTakenBy">Кто взял</th>
              <th data-i18n="showcaseAdminOrders.tableAction">Действие</th>
            </tr>
          </thead>
          <tbody id="ordersTbody">
            <tr><td colspan="10" class="empty" data-i18n="showcaseAdminOrders.loading">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card pagination">
      <div class="muted" id="summaryText" data-i18n="showcaseAdminOrders.noDataYet">Пока нет данных</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-light" id="btnPrevPage" type="button" data-i18n="showcaseAdminOrders.prevButton">← Назад</button>
        <div class="muted" id="pageInfo" data-i18n="showcaseAdminOrders.pageInfoInitial">Страница 1</div>
        <button class="btn btn-light" id="btnNextPage" type="button" data-i18n="showcaseAdminOrders.nextButton">Вперёд →</button>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    (function () {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      const tenantId = user && user.tenant_id ? Number(user.tenant_id) : 1;

      const state = {
        page: 1,
        limit: 20,
        total: 0,
        orders: [],
        openedOrderId: null,
        openedOrder: null
      };

      const messageBox = document.getElementById('messageBox');
      const ordersTbody = document.getElementById('ordersTbody');
      const searchInput = document.getElementById('searchInput');
      const statusSelect = document.getElementById('statusSelect');
      const limitSelect = document.getElementById('limitSelect');
      const summaryText = document.getElementById('summaryText');
      const pageInfo = document.getElementById('pageInfo');

      function t(key, fallback) {
        return window.i18n && typeof window.i18n.t === 'function' ? window.i18n.t(key, fallback) : fallback;
      }

      function formatI18n(key, params, fallback) {
        return window.i18n && typeof window.i18n.format === 'function' ? window.i18n.format(key, params, fallback) : String(fallback || '').replace(/\{(\w+)\}/g, function (_, name) { return params && params[name] !== undefined ? String(params[name]) : '{' + name + '}'; });
      }

      if (window.i18n && typeof window.i18n.renderLanguageSwitcher === 'function') {
        window.i18n.renderLanguageSwitcher('langSwitcher');
      }
      if (window.i18n && typeof window.i18n.applyTranslations === 'function') {
        window.i18n.applyTranslations();
      }

      const errorMap = {
        order_not_editable: 'errorOrderNotEditable',
        order_not_found: 'errorOrderNotFound',
        invalid_status: 'errorInvalidStatus',
        not_enough_stock: 'errorNotEnoughStock',
        order_not_ready_for_sale: 'errorOrderNotReadyForSale',
        sale_already_created: 'errorSaleAlreadyCreated',
        counterparty_required_for_debt: 'errorCounterpartyRequiredForDebt',
        no_picked_items_for_sale: 'errorNoPickedItemsForSale',
        nothing_picked_yet: 'errorNothingPickedYet',
        order_already_taken_or_not_new: 'errorOrderAlreadyTakenOrNotNew',
        order_not_ready_for_this_action: 'errorOrderNotReadyForThisAction',
        invalid_qty: 'errorInvalidQty',
        invalid_payload: 'errorInvalidPayload',
        server_error: 'errorServerError',
        unauthorized: 'errorUnauthorized',
        forbidden: 'errorForbidden'
      };

      function escapeHtml(value) {
        if (value === null || value === undefined) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function translateError(error) {
        const raw = error && (error.error || error.message) ? (error.error || error.message) : String(error || '');
        return errorMap[raw] ? t('showcaseAdminOrders.' + errorMap[raw], raw) : (raw || t('showcaseAdminOrders.errorUnknown', 'Неизвестная ошибка'));
      }

      function showMessage(text, variant = 'info') {
        messageBox.textContent = text;
        messageBox.className = 'message show ' + variant;
      }

      function hideMessage() {
        messageBox.textContent = '';
        messageBox.className = 'message info';
      }

      function statusLabel(status) {
        const map = {
          new: 'statusNew',
          in_progress: 'statusInProgress',
          partially_picked: 'statusPartiallyPicked',
          ready: 'statusReady',
          completed: 'statusCompletedSale',
          cancelled: 'statusCancelled',
          approved: 'statusApproved',
          picked: 'statusPicked',
          partial: 'statusPartial'
        };
        return map[status] ? t('showcaseAdminOrders.' + map[status], status) : (status || '—');
      }

      function statusClass(status) {
        return 'status s-' + (status || 'new');
      }

      function displayDateTimeSafe(value) {
        try {
          if (typeof displayDateTime === 'function') return displayDateTime(value);
        } catch (e) {}
        if (!value) return '—';
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return String(value);
        return dt.toLocaleString(window.i18n && window.i18n.getLang && window.i18n.getLang() === 'en' ? 'en-US' : 'ru-RU');
      }

      function qtyNumber(value) {
        const n = Number(value || 0);
        return Number.isFinite(n) ? n : 0;
      }

      function formatQty(value) {
        const n = qtyNumber(value);
        if (Number.isInteger(n)) return String(n);
        return String(Number(n.toFixed(3)));
      }

      function money(value) {
        const n = Number(value || 0);
        if (!Number.isFinite(n)) return '0.00';
        return n.toFixed(2);
      }

      function lineVisualClass(item) {
        const requested = qtyNumber(item.requested_qty);
        const picked = qtyNumber(item.picked_qty);

        if (picked <= 0) return 'missing';
        if (picked < requested) return 'partial';
        return 'done';
      }

      function lineHumanStatus(item) {
        const requested = qtyNumber(item.requested_qty);
        const picked = qtyNumber(item.picked_qty);

        if (picked <= 0) return t('showcaseAdminOrders.lineNotPicked', 'Не собрано');
        if (picked < requested) return t('showcaseAdminOrders.statusPartial', 'Частично');
        return t('showcaseAdminOrders.statusPicked', 'Собрано');
      }

      function canEditOrder(order) {
        return order && ['in_progress', 'partially_picked', 'ready'].includes(order.status);
      }

      function canCreateSale(order) {
        return order && order.status === 'ready';
      }

      function imageHtml(url) {
        if (!url) return '<div class="product-img-empty">' + escapeHtml(t('showcaseAdminOrders.noPhoto', 'нет фото')) + '</div>';
        return '<img src="' + escapeHtml(url) + '" alt="">';
      }

      function renderOrders() {
        if (!state.orders.length) {
          ordersTbody.innerHTML = '<tr><td colspan="10" class="empty">' + escapeHtml(t('showcaseAdminOrders.ordersNotFound', 'Заказы не найдены')) + '</td></tr>';
          summaryText.textContent = t('showcaseAdminOrders.nothingFound', 'Ничего не найдено');
          pageInfo.textContent = formatI18n('showcaseAdminOrders.pageInfo', { page: state.page }, 'Страница {page}');
          return;
        }

        const rows = [];

        state.orders.forEach((order) => {
          const isActive = Number(state.openedOrderId) === Number(order.id);

          rows.push(`
            <tr class="order-row ${isActive ? 'active' : ''}">
              <td>${escapeHtml(order.id)}</td>
              <td>
                <strong class="mono">${escapeHtml(order.order_no || '—')}</strong>
                <div class="muted">${escapeHtml(order.comment || '')}</div>
              </td>
              <td>${escapeHtml(order.buyer_name || '—')}</td>
              <td>${escapeHtml(order.buyer_phone || '—')}</td>
              <td><span class="${statusClass(order.status)}">${escapeHtml(statusLabel(order.status))}</span></td>
              <td>${escapeHtml(formatQty(order.requested_total_qty))}</td>
              <td>${escapeHtml(order.lines_count || '0')}</td>
              <td class="nowrap">${escapeHtml(displayDateTimeSafe(order.created_at))}</td>
              <td>${escapeHtml(order.taken_by_name || order.taken_by_username || '—')}</td>
              <td><button class="btn btn-light btn-small js-open-order" data-order-id="${order.id}" type="button">${isActive ? t('showcaseAdminOrders.hideButton', 'Скрыть') : t('showcaseAdminOrders.openButton', 'Открыть')}</button></td>
            </tr>
          `);

          if (isActive && state.openedOrder) {
            rows.push(`
              <tr class="details-row">
                <td colspan="10">
                  ${renderOpenedOrder()}
                </td>
              </tr>
            `);
          }
        });

        ordersTbody.innerHTML = rows.join('');
        if (window.i18n && typeof window.i18n.applyTranslations === 'function') {
          window.i18n.applyTranslations(ordersTbody);
        }

        const from = (state.page - 1) * state.limit + 1;
        const to = Math.min(state.total, state.page * state.limit);
        summaryText.textContent = formatI18n('showcaseAdminOrders.shownSummary', { from: from, to: to, total: state.total }, 'Показано {from}-{to} из {total}');
        pageInfo.textContent = formatI18n('showcaseAdminOrders.pageInfo', { page: state.page }, 'Страница {page}');
      }

      function renderOpenedOrder() {
        const order = state.openedOrder;
        const items = Array.isArray(order.items) ? order.items : [];
        const editable = canEditOrder(order);
        const saleAllowed = canCreateSale(order);

        const requestedTotal = items.reduce((sum, item) => sum + qtyNumber(item.requested_qty), 0);
        const pickedTotal = items.reduce((sum, item) => sum + qtyNumber(item.picked_qty), 0);
        const sumTotal = items.reduce((sum, item) => sum + qtyNumber(item.picked_qty) * Number(item.final_price || 0), 0);
        const doneLines = items.filter((item) => lineVisualClass(item) === 'done').length;

        return `
          <div class="order-details">
            <div class="details-head">
              <div class="details-title">
                <h3>${escapeHtml(order.order_no || t('showcaseAdminOrders.orderFallback', 'Заказ'))}</h3>
                <p>
                  ${escapeHtml(t('showcaseAdminOrders.buyerInline', 'Покупатель'))}: <strong>${escapeHtml(order.buyer_name || '—')}</strong>
                  · ${escapeHtml(t('showcaseAdminOrders.phoneInline', 'Телефон'))}: <strong>${escapeHtml(order.buyer_phone || '—')}</strong>
                  · ${escapeHtml(t('showcaseAdminOrders.statusInline', 'Статус'))}: <span class="${statusClass(order.status)}">${escapeHtml(statusLabel(order.status))}</span>
                </p>
              </div>

              <div>
                <div class="details-actions">
                  <button class="btn btn-primary btn-small js-take-order" data-order-id="${order.id}" ${order.status === 'new' ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.takeOrderButton', 'Взять заказ'))}</button>
                  <button class="btn btn-warning btn-small js-ready-order" data-order-id="${order.id}" ${editable && order.status !== 'new' && order.status !== 'ready' ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.orderReadyButton', 'Заказ готов'))}</button>
                  <button class="btn btn-success btn-small js-create-sale" data-order-id="${order.id}" data-debt="false" ${saleAllowed ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.createSaleButton', 'Провести продажу'))}</button>
                  <button class="btn btn-light btn-small js-create-sale" data-order-id="${order.id}" data-debt="true" ${saleAllowed ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.createDebtSaleButton', 'Продажа в долг'))}</button>
                </div>
                <div class="muted" style="margin-top:8px;text-align:right;font-size:12px;">
                  ${order.status === 'new' ? t('showcaseAdminOrders.hintTakeOrderFirst', 'Сначала возьми заказ в работу.') : ''}
                  ${order.status === 'ready' ? t('showcaseAdminOrders.hintReadyForSale', 'Заказ готов. Теперь можно провести продажу.') : ''}
                  ${order.status === 'completed' ? t('showcaseAdminOrders.hintCompletedClosed', 'Продажа уже проведена. Заказ закрыт для изменений.') : ''}
                </div>
              </div>
            </div>

            <div class="summary-box">
              <div class="summary-item">
                <div class="label">${escapeHtml(t('showcaseAdminOrders.summaryOrdered', 'Заказано'))}</div>
                <div class="value">${escapeHtml(formatQty(requestedTotal))}</div>
              </div>
              <div class="summary-item">
                <div class="label">${escapeHtml(t('showcaseAdminOrders.summaryPicked', 'Собрано'))}</div>
                <div class="value">${escapeHtml(formatQty(pickedTotal))}</div>
              </div>
              <div class="summary-item">
                <div class="label">${escapeHtml(t('showcaseAdminOrders.summaryLinesPicked', 'Строк собрано'))}</div>
                <div class="value">${escapeHtml(doneLines)} / ${escapeHtml(items.length)}</div>
              </div>
              <div class="summary-item">
                <div class="label">${escapeHtml(t('showcaseAdminOrders.summaryAmount', 'Сумма'))}</div>
                <div class="value">${escapeHtml(money(sumTotal))}</div>
              </div>
            </div>

            <div style="overflow:auto;">
              <table class="line-table">
                <thead>
                  <tr>
                    <th>${escapeHtml(t('showcaseAdminOrders.lineTableProduct', 'Товар'))}</th>
                    <th>${escapeHtml(t('showcaseAdminOrders.lineTableOrdered', 'Заказано'))}</th>
                    <th>${escapeHtml(t('showcaseAdminOrders.lineTablePicked', 'Собрано'))}</th>
                    <th>${escapeHtml(t('showcaseAdminOrders.lineTablePrice', 'Цена'))}</th>
                    <th data-i18n="showcaseAdminOrders.tableStatus">Статус</th>
                    <th>${escapeHtml(t('showcaseAdminOrders.lineTableActions', 'Действия'))}</th>
                  </tr>
                </thead>
                <tbody>
                  ${items.map(renderLineRow).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderLineRow(item) {
        const visual = lineVisualClass(item);
        const editable = canEditOrder(state.openedOrder);
        const requested = qtyNumber(item.requested_qty);
        const finalPrice = item.final_price === null || item.final_price === undefined || item.final_price === '' ? '' : money(item.final_price);

        return `
          <tr class="line-row ${visual}">
            <td>
              <div class="product-cell">
                <div class="product-img">${imageHtml(item.image_url)}</div>
                <div>
                  <div class="product-name">${escapeHtml(item.item_name || '—')}</div>
                  <div class="product-meta">
                    SKU: <span class="mono">${escapeHtml(item.sku || '—')}</span><br>
                    ${escapeHtml(t('showcaseAdminOrders.barcodeShort', 'ШК'))}: <span class="mono">${escapeHtml(item.barcode || '—')}</span><br>
                    ${escapeHtml(t('showcaseAdminOrders.availableLabel', 'В наличии'))}: ${escapeHtml(formatQty(item.available_qty))}<br>
                    ${escapeHtml(t('showcaseAdminOrders.boxQtyLabel', 'В коробке'))}: ${escapeHtml(formatQty(item.box_qty || 0))}
                  </div>
                </div>
              </div>
            </td>
            <td><strong>${escapeHtml(formatQty(item.requested_qty))}</strong></td>
            <td>
              <input class="qty-input js-picked-qty" data-line-id="${item.id}" type="number" step="0.001" value="${escapeHtml(formatQty(item.picked_qty || 0))}" ${editable ? '' : 'disabled'}>
            </td>
            <td>
              <input class="price-input js-final-price" data-line-id="${item.id}" type="number" step="0.01" value="${escapeHtml(finalPrice)}" ${editable ? '' : 'disabled'}>
            </td>
            <td>
              <span class="${statusClass(item.line_status || 'new')}">${escapeHtml(lineHumanStatus(item))}</span>
            </td>
            <td>
              <div class="line-actions">
                <button class="btn btn-success btn-small js-line-done" data-line-id="${item.id}" data-requested="${requested}" ${editable ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.lineDoneButton', 'Собрано'))}</button>
                <button class="btn btn-warning btn-small js-line-save" data-line-id="${item.id}" ${editable ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.saveButton', 'Сохранить'))}</button>
                <button class="btn btn-danger btn-small js-line-missing" data-line-id="${item.id}" ${editable ? '' : 'disabled'} type="button">${escapeHtml(t('showcaseAdminOrders.noButton', 'Нет'))}</button>
              </div>
            </td>
          </tr>
        `;
      }

      async function apiGet(path) {
        return API.get(path);
      }

      async function apiPost(path, body) {
        return API.post(path, body || {});
      }

      async function apiPatch(path, body) {
        return API.patch(path, body || {});
      }

      async function loadOrders() {
        hideMessage();
        ordersTbody.innerHTML = '<tr><td colspan="10" class="empty" data-i18n="showcaseAdminOrders.loading">Загрузка...</td></tr>';

        try {
          const params = new URLSearchParams();
          params.set('tenant_id', String(tenantId));
          params.set('page', String(state.page));
          params.set('limit', String(state.limit));

          if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
          if (statusSelect.value) params.set('status', statusSelect.value);

          const result = await apiGet('/showcase-admin/orders?' + params.toString());

          state.total = Number(result.total || 0);
          state.orders = Array.isArray(result.items) ? result.items : [];

          if (state.openedOrderId) {
            const exists = state.orders.some((item) => Number(item.id) === Number(state.openedOrderId));
            if (!exists) {
              state.openedOrderId = null;
              state.openedOrder = null;
            }
          }

          renderOrders();
        } catch (error) {
          console.error('[showcase-admin-orders] loadOrders error:', error);
          ordersTbody.innerHTML = '<tr><td colspan="10" class="empty">' + escapeHtml(t('showcaseAdminOrders.loadOrdersError', 'Ошибка загрузки заказов')) + '</td></tr>';
          showMessage(translateError(error), 'error');
        }
      }

      async function openOrder(orderId) {
        hideMessage();

        if (Number(state.openedOrderId) === Number(orderId)) {
          state.openedOrderId = null;
          state.openedOrder = null;
          renderOrders();
          return;
        }

        try {
          const result = await apiGet('/showcase-admin/orders/' + orderId + '?tenant_id=' + tenantId);
          state.openedOrderId = Number(orderId);
          state.openedOrder = result.order || null;
          renderOrders();
        } catch (error) {
          console.error('[showcase-admin-orders] openOrder error:', error);
          showMessage(translateError(error), 'error');
        }
      }

      async function refreshOpenedOrder() {
        if (!state.openedOrderId) return;
        const result = await apiGet('/showcase-admin/orders/' + state.openedOrderId + '?tenant_id=' + tenantId);
        state.openedOrder = result.order || null;
      }

      async function takeOrder(orderId) {
        try {
          showMessage(t('showcaseAdminOrders.takingOrderStatus', 'Берём заказ в работу...'), 'info');
          await apiPost('/showcase-admin/orders/' + orderId + '/take?tenant_id=' + tenantId, {});
          await refreshOpenedOrder();
          await loadOrders();
          showMessage(t('showcaseAdminOrders.orderTakenStatus', 'Заказ взят в работу'), 'success');
        } catch (error) {
          console.error('[showcase-admin-orders] takeOrder error:', error);
          showMessage(translateError(error), 'error');
        }
      }

      async function readyOrder(orderId) {
        try {
          showMessage(t('showcaseAdminOrders.markingReadyStatus', 'Отмечаем заказ готовым...'), 'info');
          await apiPost('/showcase-admin/orders/' + orderId + '/ready?tenant_id=' + tenantId, {});
          await refreshOpenedOrder();
          await loadOrders();
          showMessage(t('showcaseAdminOrders.orderMarkedReadyStatus', 'Заказ отмечен как готовый'), 'success');
        } catch (error) {
          console.error('[showcase-admin-orders] readyOrder error:', error);
          showMessage(translateError(error), 'error');
        }
      }

      async function createSale(orderId, isDebt) {
        try {
          showMessage(isDebt ? t('showcaseAdminOrders.creatingDebtSaleStatus', 'Проводим продажу в долг...') : t('showcaseAdminOrders.creatingSaleStatus', 'Проводим продажу...'), 'info');
          const result = await apiPost('/showcase-admin/orders/' + orderId + '/create-sale?tenant_id=' + tenantId, {
            is_debt: !!isDebt
          });
          await refreshOpenedOrder();
          await loadOrders();
          showMessage(formatI18n(isDebt ? 'showcaseAdminOrders.debtSaleCreatedStatus' : 'showcaseAdminOrders.saleCreatedStatus', { id: result.sale_id || '—' }, isDebt ? 'Продажа в долг проведена. ID: {id}' : 'Продажа проведена. ID: {id}'), 'success');
        } catch (error) {
          console.error('[showcase-admin-orders] createSale error:', error);
          showMessage(translateError(error), 'error');
        }
      }

      function getLineInputs(lineId) {
        const pickedInput = document.querySelector('.js-picked-qty[data-line-id="' + lineId + '"]');
        const priceInput = document.querySelector('.js-final-price[data-line-id="' + lineId + '"]');
        return { pickedInput, priceInput };
      }

      async function saveLine(lineId, mode, requestedQty) {
        const { pickedInput, priceInput } = getLineInputs(lineId);

        let pickedQty = Number(pickedInput ? pickedInput.value : 0);
        let finalPrice = priceInput && String(priceInput.value).trim() !== '' ? Number(priceInput.value) : null;
        let lineStatus = 'approved';

        if (mode === 'done') {
          pickedQty = Number(requestedQty || 0);
          lineStatus = 'picked';
        } else if (mode === 'missing') {
          pickedQty = 0;
          lineStatus = 'partial';
        } else {
          const requested = Number(requestedQty || 0);
          if (pickedQty <= 0) lineStatus = 'partial';
          else if (pickedQty >= requested) lineStatus = 'picked';
          else lineStatus = 'partial';
        }

        try {
          showMessage(t('showcaseAdminOrders.savingLineStatus', 'Сохраняем строку заказа...'), 'info');

          await apiPatch('/showcase-admin/orders/' + state.openedOrderId + '/items/' + lineId + '?tenant_id=' + tenantId, {
            picked_qty: pickedQty,
            final_price: finalPrice,
            line_status: lineStatus
          });

          await refreshOpenedOrder();
          await loadOrders();
          showMessage(t('showcaseAdminOrders.lineSavedStatus', 'Строка заказа сохранена'), 'success');
        } catch (error) {
          console.error('[showcase-admin-orders] saveLine error:', error);
          showMessage(translateError(error), 'error');
        }
      }

      document.getElementById('btnReloadTop').addEventListener('click', loadOrders);

      document.getElementById('btnApplyFilters').addEventListener('click', function () {
        state.page = 1;
        state.limit = Number(limitSelect.value || 20);
        loadOrders();
      });

      document.getElementById('btnClearFilters').addEventListener('click', function () {
        searchInput.value = '';
        statusSelect.value = '';
        limitSelect.value = '20';
        state.page = 1;
        state.limit = 20;
        state.openedOrderId = null;
        state.openedOrder = null;
        loadOrders();
      });

      document.getElementById('btnPrevPage').addEventListener('click', function () {
        if (state.page <= 1) return;
        state.page -= 1;
        loadOrders();
      });

      document.getElementById('btnNextPage').addEventListener('click', function () {
        const maxPage = Math.max(1, Math.ceil(state.total / state.limit));
        if (state.page >= maxPage) return;
        state.page += 1;
        loadOrders();
      });

      ordersTbody.addEventListener('click', function (e) {
        const openBtn = e.target.closest('.js-open-order');
        if (openBtn) {
          openOrder(Number(openBtn.getAttribute('data-order-id')));
          return;
        }

        const takeBtn = e.target.closest('.js-take-order');
        if (takeBtn) {
          takeOrder(Number(takeBtn.getAttribute('data-order-id')));
          return;
        }

        const readyBtn = e.target.closest('.js-ready-order');
        if (readyBtn) {
          readyOrder(Number(readyBtn.getAttribute('data-order-id')));
          return;
        }

        const saleBtn = e.target.closest('.js-create-sale');
        if (saleBtn) {
          createSale(
            Number(saleBtn.getAttribute('data-order-id')),
            saleBtn.getAttribute('data-debt') === 'true'
          );
          return;
        }

        const doneBtn = e.target.closest('.js-line-done');
        if (doneBtn) {
          saveLine(Number(doneBtn.getAttribute('data-line-id')), 'done', Number(doneBtn.getAttribute('data-requested')));
          return;
        }

        const saveBtn = e.target.closest('.js-line-save');
        if (saveBtn) {
          const lineId = Number(saveBtn.getAttribute('data-line-id'));
          const item = state.openedOrder && Array.isArray(state.openedOrder.items)
            ? state.openedOrder.items.find((line) => Number(line.id) === lineId)
            : null;
          saveLine(lineId, 'save', item ? Number(item.requested_qty) : 0);
          return;
        }

        const missingBtn = e.target.closest('.js-line-missing');
        if (missingBtn) {
          saveLine(Number(missingBtn.getAttribute('data-line-id')), 'missing', 0);
        }
      });

      searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          state.page = 1;
          state.limit = Number(limitSelect.value || 20);
          loadOrders();
        }
      });

      statusSelect.addEventListener('change', function () {
        state.page = 1;
        loadOrders();
      });

      document.addEventListener('app:language-changed', function () {
        if (window.i18n && typeof window.i18n.applyTranslations === 'function') {
          window.i18n.applyTranslations();
        }
        renderOrders();
      });

      loadOrders();
    })();
  </script>
</body>
</html>
