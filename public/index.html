<!-- ВСТАВЬ ВЕСЬ ФАЙЛ НИЖЕ ПОЛНОСТЬЮ -->

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #e9eef6;
      margin: 0;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .lang-switch {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .lang-switch button {
      padding: 6px 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="lang-switch">
  <button onclick="i18n.setLang('ru')">RU</button>
  <button onclick="i18n.setLang('en')">EN</button>
  <button onclick="i18n.setLang('zh')">中文</button>
</div>

<div class="topbar">
  <div>
    <h1>BFC24 CONTROL</h1>
    <div data-i18n="main_menu"></div>
  </div>
  <div id="userBox" data-i18n="loading_user"></div>
</div>

<div class="menu">

  <div class="card" onclick="location.href='/items.html'">
    <h3 data-i18n="items"></h3>
    <div data-i18n="items_desc"></div>
  </div>

  <div class="card" onclick="location.href='/locations.html'">
    <h3 data-i18n="locations"></h3>
    <div data-i18n="locations_desc"></div>
  </div>

  <div class="card" onclick="location.href='/clients.html'">
    <h3 data-i18n="clients"></h3>
    <div data-i18n="clients_desc"></div>
  </div>

  <div class="card" onclick="location.href='/stock.html'">
    <h3 data-i18n="stock"></h3>
    <div data-i18n="stock_desc"></div>
  </div>

  <div class="card" onclick="location.href='/movements.html'">
    <h3 data-i18n="movements"></h3>
    <div data-i18n="movements_desc"></div>
  </div>

  <div class="card" onclick="location.href='/incoming.html'">
    <h3 data-i18n="incoming"></h3>
    <div data-i18n="incoming_desc"></div>
  </div>

  <div class="card" onclick="location.href='/sales.html'">
    <h3 data-i18n="sales"></h3>
    <div data-i18n="sales_desc"></div>
  </div>

  <div class="card" onclick="location.href='/writeoff.html'">
    <h3 data-i18n="writeoff"></h3>
    <div data-i18n="writeoff_desc"></div>
  </div>

  <div class="card" onclick="location.href='/cash.html'">
    <h3 data-i18n="cash"></h3>
    <div data-i18n="cash_desc"></div>
  </div>

  <div class="card" onclick="location.href='/expenses.html'">
    <h3 data-i18n="expenses"></h3>
    <div data-i18n="expenses_desc"></div>
  </div>

  <div class="card" onclick="location.href='/analytics.html'">
    <h3 data-i18n="analytics"></h3>
    <div data-i18n="analytics_desc"></div>
  </div>

  <div class="card" onclick="location.href='/debts.html'">
    <h3 data-i18n="debts"></h3>
    <div data-i18n="debts_desc"></div>
  </div>

  <div class="card" onclick="logout()">
    <h3 data-i18n="logout"></h3>
    <div data-i18n="logout_desc"></div>
  </div>

</div>

<script src="/js/i18n.js"></script>

<script>
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  location.href = "/login.html";
}

i18n.applyTranslations();
</script>

</body>
</html>
