<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Проверка цены</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --success-bg:#eefbf3;
      --warning:#d97706;
      --danger:#dc2626;
      --danger-bg:#fff5f5;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:16px 16px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
    }

    .title{
      font-size:22px;
      font-weight:800;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      white-space:nowrap;
      transition:.15s ease;
    }

    .btn-light{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-block{
      width:100%;
      display:block;
      text-align:center;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .scan-input{
      width:100%;
      font-size:20px;
      padding:16px 14px;
      border:2px solid var(--line);
      border-radius:14px;
      text-align:center;
      letter-spacing:1px;
      font-weight:700;
      outline:none;
    }

    .scan-input:focus{
      border-color:var(--primary);
    }

    .hint{
      color:var(--muted);
      font-size:13px;
      text-align:center;
      margin-top:10px;
    }

    .camera-btn{
      margin-top:12px;
      font-size:17px;
      padding:16px;
    }

    .result-card{
      display:none;
    }

    .result-card.show{
      display:block;
    }

    .result-photo{
      width:100%;
      max-height:220px;
      object-fit:contain;
      background:#f2f4f8;
      border-radius:12px;
      margin-bottom:14px;
    }

    .result-name{
      font-size:20px;
      font-weight:800;
      margin-bottom:4px;
    }

    .result-sub{
      color:var(--muted);
      font-size:13px;
      margin-bottom:16px;
    }

    .result-price-label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .result-price{
      font-size:40px;
      font-weight:800;
      color:var(--primary);
      margin:2px 0 18px;
    }

    .locations-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:10px;
      color:var(--text);
    }

    .location-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      background:#f6f8fb;
      border-radius:10px;
      margin-bottom:8px;
      font-size:15px;
    }

    .location-name{
      font-weight:700;
    }

    .location-qty{
      font-weight:800;
      color:var(--success);
      font-size:16px;
    }

    .no-stock{
      color:var(--danger);
      font-weight:700;
      text-align:center;
      padding:14px;
    }

    .status-box{
      display:none;
      border-radius:12px;
      padding:14px;
      font-size:14px;
      font-weight:600;
      text-align:center;
      margin-bottom:16px;
    }

    .status-box.show{
      display:block;
    }

    .status-box.info{
      background:#eef2ff;
      color:#3730a3;
    }

    .status-box.error{
      background:var(--danger-bg);
      color:var(--danger);
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.7);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:1000;
    }

    .modal-overlay.open{
      display:flex;
    }

    .modal-box{
      width:100%;
      max-width:480px;
      background:#000;
      border-radius:18px;
      overflow:hidden;
      position:relative;
    }

    #camera-reader{
      width:100%;
      min-height:280px;
    }

    .modal-close{
      position:absolute;
      top:10px;
      right:10px;
      z-index:10;
      width:42px;
      height:42px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,.92);
      font-size:20px;
      cursor:pointer;
    }

    .modal-hint{
      color:#fff;
      text-align:center;
      font-size:13px;
      padding:10px;
      background:rgba(0,0,0,.6);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button type="button" class="btn btn-light" onclick="goBack()">← Назад</button>
      <div class="title">Проверка цены</div>
      <button type="button" class="btn btn-light" onclick="logout()">Выйти</button>
    </div>

    <div class="card">
      <form id="lookupForm">
        <input
          id="barcodeInput"
          class="scan-input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          placeholder="Штрихкод"
          autofocus
        />
      </form>
      <div class="hint">Отсканируйте сканером/камерой или введите штрихкод и нажмите Enter</div>
      <button type="button" class="btn btn-primary btn-block camera-btn" id="openCameraBtn">📷 Сканировать камерой</button>
    </div>

    <div class="status-box" id="statusBox"></div>

    <div class="card result-card" id="resultCard">
      <img id="resultPhoto" class="result-photo" style="display:none;" alt="" />
      <div class="result-name" id="resultName"></div>
      <div class="result-sub" id="resultSub"></div>

      <div class="result-price-label">Цена продажи</div>
      <div class="result-price" id="resultPrice">—</div>

      <div class="locations-title">Наличие по точкам</div>
      <div id="locationsList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="cameraModal">
    <div class="modal-box">
      <button type="button" class="modal-close" id="closeCameraBtn">×</button>
      <div id="camera-reader"></div>
      <div class="modal-hint">Наведите камеру на штрихкод товара</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function requestFallback(method, path) {
      const authToken = localStorage.getItem("token") || "";
      const response = await fetch((window.AppConfig ? window.AppConfig.API_BASE : "") + path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(authToken ? { Authorization: "Bearer " + authToken } : {})
        }
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        const err = new Error(data.error || data.message || ("HTTP " + response.status));
        err.code = data.error || null;
        throw err;
      }

      return data;
    }

    function apiGet(path) {
      if (window.API && typeof window.API.get === "function") {
        return window.API.get(path);
      }
      return requestFallback("GET", path);
    }

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function formatMoney(value) {
      const num = Number(value || 0);
      return new Intl.NumberFormat("ru-RU", { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num) + " ₽";
    }

    const els = {
      form: document.getElementById("lookupForm"),
      barcodeInput: document.getElementById("barcodeInput"),
      statusBox: document.getElementById("statusBox"),
      resultCard: document.getElementById("resultCard"),
      resultPhoto: document.getElementById("resultPhoto"),
      resultName: document.getElementById("resultName"),
      resultSub: document.getElementById("resultSub"),
      resultPrice: document.getElementById("resultPrice"),
      locationsList: document.getElementById("locationsList"),
      openCameraBtn: document.getElementById("openCameraBtn"),
      closeCameraBtn: document.getElementById("closeCameraBtn"),
      cameraModal: document.getElementById("cameraModal"),
    };

    function showStatus(text, type) {
      els.statusBox.textContent = text;
      els.statusBox.className = "status-box show " + type;
    }

    function hideStatus() {
      els.statusBox.className = "status-box";
      els.statusBox.textContent = "";
    }

    function hideResult() {
      els.resultCard.classList.remove("show");
    }

    function renderResult(data) {
      const item = data.item || {};
      const stock = Array.isArray(data.stock) ? data.stock : [];

      if (item.image_url) {
        els.resultPhoto.src = item.image_url;
        els.resultPhoto.style.display = "block";
      } else {
        els.resultPhoto.style.display = "none";
      }

      els.resultName.textContent = item.name || "Без названия";

      const subParts = [];
      if (item.sku) subParts.push("SKU: " + item.sku);
      if (item.barcode) subParts.push("ШК: " + item.barcode);
      if (item.category_name) subParts.push(item.category_name);
      els.resultSub.textContent = subParts.join(" · ");

      els.resultPrice.textContent = formatMoney(item.sale_price);

      if (!stock.length) {
        els.locationsList.innerHTML = '<div class="no-stock">Нет в наличии ни на одной точке</div>';
      } else {
        els.locationsList.innerHTML = stock.map((row) => `
          <div class="location-row">
            <span class="location-name">${escapeHtml(row.location_name || "")}${row.location_code ? " (" + escapeHtml(row.location_code) + ")" : ""}</span>
            <span class="location-qty">${escapeHtml(String(row.qty))} ${escapeHtml(item.unit || "шт")}</span>
          </div>
        `).join("");
      }

      els.resultCard.classList.add("show");
    }

    async function lookupBarcode(barcode) {
      const value = String(barcode || "").trim();
      if (!value) return;

      hideResult();
      showStatus("Ищем товар...", "info");

      try {
        const data = await apiGet("/items/lookup-by-barcode/" + encodeURIComponent(value));
        hideStatus();
        renderResult(data);
      } catch (err) {
        hideResult();
        if (err.code === "item_not_found_by_barcode") {
          showStatus("Товар с таким штрихкодом не найден", "error");
        } else {
          showStatus("Не удалось выполнить поиск: " + err.message, "error");
        }
      }
    }

    function refocusInput() {
      els.barcodeInput.value = "";
      els.barcodeInput.focus();
    }

    els.form.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = els.barcodeInput.value;
      lookupBarcode(value).then(() => {
        els.barcodeInput.value = "";
      });
    });

    // --- Камера ---
    let html5QrCode = null;
    let cameraRunning = false;

    async function openCamera() {
      els.cameraModal.classList.add("open");

      if (typeof Html5Qrcode === "undefined") {
        showStatus("Не удалось загрузить модуль камеры. Проверьте интернет-соединение.", "error");
        els.cameraModal.classList.remove("open");
        return;
      }

      try {
        html5QrCode = new Html5Qrcode("camera-reader");
        cameraRunning = true;

        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 150 } },
          (decodedText) => {
            closeCamera();
            els.barcodeInput.value = decodedText;
            lookupBarcode(decodedText).then(() => {
              els.barcodeInput.value = "";
            });
          },
          () => {
            // ignore per-frame "not found" callbacks
          }
        );
      } catch (err) {
        cameraRunning = false;
        els.cameraModal.classList.remove("open");
        showStatus("Не удалось включить камеру: проверьте разрешения браузера.", "error");
      }
    }

    async function closeCamera() {
      els.cameraModal.classList.remove("open");
      if (html5QrCode && cameraRunning) {
        try {
          await html5QrCode.stop();
          html5QrCode.clear();
        } catch (_) {}
      }
      cameraRunning = false;
    }

    els.openCameraBtn.addEventListener("click", openCamera);
    els.closeCameraBtn.addEventListener("click", closeCamera);

    refocusInput();
  </script>
</body>
</html>
