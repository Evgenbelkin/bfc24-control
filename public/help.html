<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Инструкция</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #e9eef6;
      --bg-accent: #dde7f5;
      --card-bg: rgba(255, 255, 255, 0.98);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --border-color: #dbe4f0;
      --shadow-sm: 0 2px 6px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 8px 22px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; min-height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #f8fbff 0%, var(--bg-color) 42%, var(--bg-accent) 100%);
      color: var(--text-main);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(26px, 3.6vw, 36px);
      font-weight: 800;
      margin: 0 0 4px 0;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--text-muted); font-size: 14px; }

    .btn {
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.95);
      color: var(--text-main);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    .sidebar {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 14px;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .search-box {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }

    .search-box:focus { border-color: var(--accent-color); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-radius: 10px;
      padding: 10px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: #f1f5f9; }

    .nav-item.active {
      background: var(--accent-color);
      color: #fff;
    }

    .nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }

    .content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 28px 30px;
      min-height: 400px;
    }

    .content h2 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content .purpose {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-color);
    }

    .block-title {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--accent-color);
      margin: 22px 0 10px;
    }

    .block-title:first-of-type { margin-top: 0; }

    ol, ul { margin: 0; padding-left: 22px; }

    ol li, ul li { margin-bottom: 8px; font-size: 15px; }

    .notes-box {
      background: #eef2ff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 6px;
    }

    .notes-box ul { padding-left: 20px; }

    .tip-box {
      background: #eefbf3;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 14px;
      color: #14532d;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 60px 0;
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        max-height: none;
        display: flex;
        flex-direction: column;
      }
      .content { padding: 20px; }
    }
  </style>
</head>

          "Настройка (владелец): откройте «Настройки витрины», заполните название магазина, телефон, описание, логотип и баннер, включите переключатель «Витрина включена» и настройте видимость цен.",
          "Доступ клиента: на странице «Клиенты» нажмите «Создать доступ» и передайте клиенту логин/пароль — он заходит на витрину по Tenant ID, логину и паролю, выбирает товары и оформляет заказ.",
          "Обработка заказа (продавец): откройте «Заказы витрины», найдите заказ, «Открыть» → «Взять в работу», укажите фактически собранное количество по каждой позиции, отметьте «Готов» и нажмите «Создать продажу»."
        ],
        tip: "Клиент следит за статусом своего заказа в разделе «Мои заказы» на витрине."
      },
      {
        id: "notifications", icon: "🔔", title: "Уведомления",
        purpose: "Telegram-уведомления о новых заказах с витрины и системных событиях.",
        steps: [
          "Создайте бота через @BotFather в Telegram и получите Bot token.",
          "Узнайте свой chat_id и укажите его в поле «Owner chat_id».",
          "Включите переключатель «Включить Telegram-уведомления» → «Сохранить настройки».",
          "Нажмите «Отправить тест», чтобы проверить, что сообщения приходят."
        ]
      }
    ];

    const navList = document.getElementById("navList");
    const contentBox = document.getElementById("contentBox");
    const searchBox = document.getElementById("searchBox");
    let activeId = null;

    function renderNav(filter = "") {
      const q = filter.trim().toLowerCase();
      navList.innerHTML = "";
      MODULES
        .filter((m) => !q || m.title.toLowerCase().includes(q))
        .forEach((m) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "nav-item" + (m.id === activeId ? " active" : "");
          btn.innerHTML = `<span class="nav-icon">${m.icon}</span><span>${m.title}</span>`;
          btn.addEventListener("click", () => showModule(m.id));
          navList.appendChild(btn);
        });
    }

    function showModule(id) {
      const m = MODULES.find((x) => x.id === id);
      if (!m) return;
      activeId = id;
      renderNav(searchBox.value);

      const stepsHtml = (m.steps || []).map((s) => `<li>${s}</li>`).join("");
      const notesHtml = m.notes
        ? `<div class="block-title">${m.notesTitle || "Особенности"}</div>
           <div class="notes-box"><ul>${m.notes.map((n) => `<li>${n}</li>`).join("")}</ul></div>`
        : "";
      const tipHtml = m.tip ? `<div class="tip-box">💡 ${m.tip}</div>` : "";

      contentBox.innerHTML = `
        <h2><span>${m.icon}</span><span>${m.title}</span></h2>
        <div class="purpose">${m.purpose}</div>
        <div class="block-title">Как пользоваться</div>
        <ol>${stepsHtml}</ol>
        ${notesHtml}
        ${tipHtml}
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    searchBox.addEventListener("input", () => renderNav(searchBox.value));

    renderNav();
    showModule(MODULES[0].id);
  </script>
</body>
</html>
