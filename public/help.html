<html lang="ru" data-page-title-i18n="help.pageTitle">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #e9eef6;
      --bg-accent: #dde7f5;
      --card-bg: rgba(255, 255, 255, 0.98);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --border-color: #dbe4f0;
      --shadow-sm: 0 2px 6px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 8px 22px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; min-height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #f8fbff 0%, var(--bg-color) 42%, var(--bg-accent) 100%);
      color: var(--text-main);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(26px, 3.6vw, 36px);
      font-weight: 800;
      margin: 0 0 4px 0;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--text-muted); font-size: 14px; }

    .btn {
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.95);
      color: var(--text-main);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .lang-switcher {
      display: flex;
      gap: 6px;
    }

    .lang-switcher button {
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.95);
      color: var(--text-main);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-width: 44px;
      box-shadow: var(--shadow-sm);
    }

    .lang-switcher button.active {
      background: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }

    .sidebar {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 14px;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .search-box {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }

    .search-box:focus { border-color: var(--accent-color); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-radius: 10px;
      padding: 10px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: #f1f5f9; }

    .nav-item.active {
      background: var(--accent-color);
      color: #fff;
    }

    .nav-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }

    .content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 28px 30px;
      min-height: 400px;
    }

    .content h2 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content .purpose {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border-color);
    }

    .block-title {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--accent-color);
      margin: 22px 0 10px;
    }

    .block-title:first-of-type { margin-top: 0; }

    ol, ul { margin: 0; padding-left: 22px; }

    ol li, ul li { margin-bottom: 8px; font-size: 15px; }

    .notes-box {
      background: #eef2ff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 6px;
    }

    .notes-box ul { padding-left: 20px; }

    .tip-box {
      background: #eefbf3;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 14px;
      color: #14532d;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 60px 0;
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        max-height: none;
        display: flex;
        flex-direction: column;
      }
      .content { padding: 20px; }
    }
  </style>
</head>

            "查看各板块：损益（营业额、成本、利润、支出）、按日趋势图、热销商品、周转异常商品、欠款与赊销、库存状态、库存差异。"
          ],
          tip: "更改时间段后数据会自动重新计算——只有在新增操作后才需要点击「刷新」按钮。"
        },
        {
          id: "turnover", icon: "🔄", title: "周转分析",
          purpose: "分析销售速度和占用资金的滞销商品。",
          steps: [
            "选择分析时间段，如有需要可按状态筛选（健康/预警/风险/严重/无销售/无库存）。",
            "设置颜色阈值——多少天算黄色、橙色、红色。",
            "查看表格和图表，可按任意列排序。",
            "点击「CSV」导出数据。"
          ]
        },
        {
          id: "users", icon: "🧑‍💼", title: "用户",
          purpose: "管理员工账号、角色以及对各模块的访问权限。",
          steps: [
            "填写登录名、姓名、密码（新建账号时必填）。",
            "勾选该员工可访问的模块。",
            "点击「保存」——员工即可使用自己的账号登录。",
            "后续可执行的操作：「编辑」、启用/停用、「锁定」、「重置密码」。"
          ],
          tip: "所有者角色不能通过界面分配——所有新员工都以普通员工身份创建，并拥有各自的模块权限。"
        },
        {
          id: "price-check", icon: "🔍", title: "价格查询",
          purpose: "在卖场直接通过条码快速查询商品价格和库存情况的手机页面。",
          steps: [
            "用手机打开该页面。",
            "用相机扫描条码（「用相机扫描」按钮）或使用物理扫码枪——输入框默认处于聚焦状态。",
            "获取商品卡片：照片、名称、销售价，以及各地点的库存情况。"
          ]
        },
        {
          id: "showcase", icon: "🛍️", title: "客户商城",
          purpose: "客户可自行下单、由您负责处理的在线商城。",
          steps: [
            "设置（所有者）：打开「商城设置」，填写店铺名称、电话、简介、Logo和横幅图，打开「商城已启用」开关，并设置价格可见性。",
            "客户访问权限：在「客户」页面点击「创建访问权限」，将登录名/密码提供给客户——客户使用 Tenant ID、登录名和密码登录商城，选择商品并下单。",
            "处理订单（销售员）：打开「商城订单」，找到订单，「打开」 → 「开始处理」，填写每个商品实际备货数量，标记为「已完成」并点击「创建销售」。"
          ],
          tip: "客户可在商城的「我的订单」中查看订单状态。"
        },
        {
          id: "notifications", icon: "🔔", title: "通知",
          purpose: "关于商城新订单和系统事件的Telegram通知。",
          steps: [
            "在Telegram中通过 @BotFather 创建一个机器人并获取 Bot token。",
            "获取您的 chat_id，并填写到「Owner chat_id」字段中。",
            "打开「启用Telegram通知」开关 → 「保存设置」。",
            "点击「发送测试」，检查消息是否能够送达。"
          ]
        }
      ]
    };

    const navList = document.getElementById("navList");
    const contentBox = document.getElementById("contentBox");
    const searchBox = document.getElementById("searchBox");
    let activeId = null;

    function getModules() {
      const lang = window.i18n ? window.i18n.getLang() : "ru";
      return MODULES_I18N[lang] || MODULES_I18N.ru;
    }

    function renderNav(filter = "") {
      const q = filter.trim().toLowerCase();
      const MODULES = getModules();
      navList.innerHTML = "";
      MODULES
        .filter((m) => !q || m.title.toLowerCase().includes(q))
        .forEach((m) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "nav-item" + (m.id === activeId ? " active" : "");
          btn.innerHTML = `<span class="nav-icon">${m.icon}</span><span>${m.title}</span>`;
          btn.addEventListener("click", () => showModule(m.id));
          navList.appendChild(btn);
        });
    }

    function showModule(id) {
      const MODULES = getModules();
      const m = MODULES.find((x) => x.id === id) || MODULES[0];
      if (!m) return;
      activeId = m.id;
      renderNav(searchBox.value);

      const howToUseTitle = window.i18n ? window.i18n.t("help.howToUseTitle") : "Как пользоваться";
      const notesDefaultTitle = window.i18n ? window.i18n.t("help.notesDefaultTitle") : "Особенности";

      const stepsHtml = (m.steps || []).map((s) => `<li>${s}</li>`).join("");
      const notesHtml = m.notes
        ? `<div class="block-title">${m.notesTitle || notesDefaultTitle}</div>
           <div class="notes-box"><ul>${m.notes.map((n) => `<li>${n}</li>`).join("")}</ul></div>`
        : "";
      const tipHtml = m.tip ? `<div class="tip-box">💡 ${m.tip}</div>` : "";

      contentBox.innerHTML = `
        <h2><span>${m.icon}</span><span>${m.title}</span></h2>
        <div class="purpose">${m.purpose}</div>
        <div class="block-title">${howToUseTitle}</div>
        <ol>${stepsHtml}</ol>
        ${notesHtml}
        ${tipHtml}
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    searchBox.addEventListener("input", () => renderNav(searchBox.value));

    document.addEventListener("app:language-changed", () => {
      const currentId = activeId;
      renderNav(searchBox.value);
      showModule(currentId || getModules()[0].id);
    });

    if (window.i18n) {
      i18n.applyTranslations();
      i18n.renderLanguageSwitcher("langSwitcher");
    }

    renderNav();
    showModule(getModules()[0].id);
  </script>
</body>
</html>
