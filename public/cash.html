<!DOCTYPE html>
<html lang="ru" data-page-title-i18n="cash.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Деньги</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      transition:.15s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-light:hover{
      border-color:#cbd5e1;
      background:#f8fafc;
    }

    .btn-period.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .filters{
      display:grid;
      grid-template-columns:1.4fr 1fr 1fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    .period-buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
      max-height:68vh;
      border-radius:12px;
    }

    table{
      width:100%;
      min-width:1150px;
      border-collapse:separate;
      border-spacing:0;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
      background:#fff;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 2px 0 #eef1f5;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .badge-income{
      color:#166534;
      background:#f0fdf4;
      border-color:#bbf7d0;
    }

    .badge-expense{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    #langSwitcher{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    #langSwitcher button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    @media (max-width: 1180px){
      .filters{
        grid-template-columns:1fr 1fr 1fr;
      }
    }

    @media (max-width: 980px){
      .filters,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }

      .period-buttons{
        display:grid;
        grid-template-columns:repeat(3,1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="cash.heading">Деньги</div>
      <div class="top-actions">
        <div id="langSwitcher"></div>
        <button class="btn btn-light" onclick="goBack()" data-i18n="cash.backButton">Назад</button>
        <button class="btn btn-light" onclick="logout()" data-i18n="cash.logoutButton">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="cash.filtersTitle">Фильтры</h2>

      <div class="filters">
        <div class="field">
          <label for="searchInput" data-i18n="cash.searchLabel">Поиск по клиенту / товару / комментарию</label>
          <input id="searchInput" type="text" data-i18n-placeholder="cash.searchPlaceholder" placeholder="Например: Иванов, Тест товар, наличные" />
        </div>

        <div class="field">
          <label for="typeFilter" data-i18n="cash.typeFilterLabel">Тип движения</label>
          <select id="typeFilter">
            <option value="" data-i18n="cash.typeAll">Все</option>
            <option value="income" data-i18n="cash.typeIncome">Доход</option>
            <option value="expense" data-i18n="cash.typeExpense">Расход</option>
          </select>
        </div>

        <div class="field">
          <label for="paymentFilter" data-i18n="cash.paymentFilterLabel">Способ оплаты</label>
          <select id="paymentFilter">
            <option value="" data-i18n="cash.paymentAll">Все</option>
            <option value="cash" data-i18n="cash.paymentCash">Наличные</option>
            <option value="card" data-i18n="cash.paymentCard">Карта</option>
            <option value="transfer" data-i18n="cash.paymentTransfer">Перевод</option>
            <option value="consignment" data-i18n="cash.paymentConsignment">Под реализацию</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="cash.quickPeriodLabel">Быстрый период</label>
          <div class="period-buttons">
            <button type="button" class="btn btn-light btn-period" id="periodTodayBtn" data-i18n="cash.periodToday">Сегодня</button>
            <button type="button" class="btn btn-light btn-period" id="periodWeekBtn" data-i18n="cash.periodWeek">Неделя</button>
            <button type="button" class="btn btn-light btn-period" id="periodMonthBtn" data-i18n="cash.periodMonth">Месяц</button>
          </div>
        </div>

        <div class="field">
          <label for="dateFrom" data-i18n="cash.dateFromLabel">Дата от</label>
          <input id="dateFrom" type="date" />
        </div>

        <div class="field">
          <label for="dateTo" data-i18n="cash.dateToLabel">Дата до</label>
          <input id="dateTo" type="date" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button type="button" class="btn btn-primary" id="refreshBtn" data-i18n="cash.refreshButton">Обновить</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="cash.statsRows">Записей</div>
          <div class="stat-value" id="rowsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="cash.statsIncome">Доход</div>
          <div class="stat-value" id="incomeTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="cash.statsExpense">Расход</div>
          <div class="stat-value" id="expenseTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="cash.statsBalance">Баланс</div>
          <div class="stat-value" id="balanceTotal">0</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="cash.tableTitle">Движения денег</h2>
      <div class="muted" data-i18n="cash.tableSubtitle">Показываются денежные операции по продажам, оплатам и другим действиям.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="cash.tableId">ID</th>
              <th data-i18n="cash.tableType">Тип</th>
              <th data-i18n="cash.tableAmount">Сумма</th>
              <th data-i18n="cash.tablePayment">Оплата</th>
              <th data-i18n="cash.tableClient">Клиент</th>
              <th data-i18n="cash.tableItem">Товар</th>
              <th data-i18n="cash.tableCategory">Категория</th>
              <th data-i18n="cash.tableComment">Комментарий</th>
              <th data-i18n="cash.tableDate">Дата</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="9" class="empty" data-i18n="cash.loadingRows">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const FALLBACK_TENANT_ID = 1;

    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const authToken = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(authToken ? { Authorization: "Bearer " + authToken } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      }
    };

    let authUser = null;
    let cashData = [];
    let activePeriod = "";

    const els = {
      searchInput: document.getElementById("searchInput"),
      typeFilter: document.getElementById("typeFilter"),
      paymentFilter: document.getElementById("paymentFilter"),
      dateFrom: document.getElementById("dateFrom"),
      dateTo: document.getElementById("dateTo"),
      periodTodayBtn: document.getElementById("periodTodayBtn"),
      periodWeekBtn: document.getElementById("periodWeekBtn"),
      periodMonthBtn: document.getElementById("periodMonthBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      rowsCount: document.getElementById("rowsCount"),
      incomeTotal: document.getElementById("incomeTotal"),
      expenseTotal: document.getElementById("expenseTotal"),
      balanceTotal: document.getElementById("balanceTotal")
    };

    function t(key) {
      return window.i18n ? window.i18n.t(key) : key;
    }

    function tf(key, vars) {
      return window.i18n ? window.i18n.format(key, vars) : key;
    }

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== "") {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(FALLBACK_TENANT_ID);
    }

    function showStatus(text, type = "info") {
      els.pageStatus.className = "status show " + type;
      els.pageStatus.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function formatDate(value) {
      return Ui.displayDateTime(value);
    }

    function paymentLabel(value) {
      if (value === "cash") return t("cash.paymentCash");
      if (value === "card") return t("cash.paymentCard");
      if (value === "transfer") return t("cash.paymentTransfer");
      if (value === "consignment") return t("cash.paymentConsignment");
      return value || "";
    }

    function typeBadge(type) {
      if (type === "expense") {
        return `<span class="badge badge-expense">${escapeHtml(t("cash.badgeExpense"))}</span>`;
      }
      return `<span class="badge badge-income">${escapeHtml(t("cash.badgeIncome"))}</span>`;
    }

    async function apiGet(path) {
      return ApiBridge.get(path);
    }

    function normalizeCashRow(row) {
      return {
        id: row.id,
        transaction_type: row.transaction_type || row.type || "",
        amount: Number(row.amount || 0),
        payment_method: row.payment_method || "",
        counterparty_name:
          row.counterparty_name ||
          row.client_name ||
          row.customer_name ||
          "",
        item_name:
          row.item_name ||
          row.product_name ||
          row.name ||
          "",
        category: row.category || "",
        comment: row.comment || "",
        created_at: row.created_at || row.date || null
      };
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function setActivePeriod(period) {
      activePeriod = period;
      els.periodTodayBtn.classList.toggle("active", period === "today");
      els.periodWeekBtn.classList.toggle("active", period === "week");
      els.periodMonthBtn.classList.toggle("active", period === "month");
    }

    function setPeriod(period) {
      const now = new Date();
      const todayValue = toDateInputValue(now);

      if (period === "today") {
        els.dateFrom.value = todayValue;
        els.dateTo.value = todayValue;
      } else if (period === "week") {
        const from = new Date(now);
        from.setDate(from.getDate() - 6);
        els.dateFrom.value = toDateInputValue(from);
        els.dateTo.value = todayValue;
      } else if (period === "month") {
        const from = new Date(now);
        from.setMonth(from.getMonth() - 1);
        els.dateFrom.value = toDateInputValue(from);
        els.dateTo.value = todayValue;
      }

      setActivePeriod(period);
      renderTable();
    }

    function clearActivePeriod() {
      setActivePeriod("");
    }

    function isInDateRange(row) {
      const from = els.dateFrom.value;
      const to = els.dateTo.value;

      if (!from && !to) return true;
      if (!row.created_at) return false;

      const rowDate = new Date(row.created_at);
      if (Number.isNaN(rowDate.getTime())) return false;

      if (from) {
        const fromDate = new Date(`${from}T00:00:00`);
        if (rowDate < fromDate) return false;
      }

      if (to) {
        const toDate = new Date(`${to}T23:59:59.999`);
        if (rowDate > toDate) return false;
      }

      return true;
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      const type = els.typeFilter.value;
      const payment = els.paymentFilter.value;

      return cashData
        .filter(row => !type || row.transaction_type === type)
        .filter(row => !payment || row.payment_method === payment)
        .filter(row => isInDateRange(row))
        .filter(row => {
          if (!search) return true;
          const text = [
            row.counterparty_name,
            row.item_name,
            row.category,
            row.comment,
            row.payment_method,
            row.transaction_type
          ].join(" ").toLowerCase();

          return text.includes(search);
        });
    }

    function updateStats(rows) {
      const income = rows
        .filter(row => row.transaction_type === "income")
        .reduce((sum, row) => sum + Number(row.amount || 0), 0);

      const expense = rows
        .filter(row => row.transaction_type === "expense")
        .reduce((sum, row) => sum + Number(row.amount || 0), 0);

      const balance = income - expense;

      els.rowsCount.textContent = String(rows.length);
      els.incomeTotal.textContent = formatMoney(income);
      els.expenseTotal.textContent = formatMoney(expense);
      els.balanceTotal.textContent = formatMoney(balance);
    }

    function renderTable() {
      const rows = getFilteredRows();
      updateStats(rows);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${escapeHtml(t("cash.noData"))}</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.id)}</td>
          <td>${typeBadge(row.transaction_type)}</td>
          <td>${escapeHtml(formatMoney(row.amount))}</td>
          <td>${escapeHtml(paymentLabel(row.payment_method))}</td>
          <td>${escapeHtml(row.counterparty_name)}</td>
          <td>${escapeHtml(row.item_name)}</td>
          <td>${escapeHtml(row.category)}</td>
          <td>${escapeHtml(row.comment)}</td>
          <td>${escapeHtml(formatDate(row.created_at))}</td>
        </tr>
      `).join("");
    }

    function refreshStaticTranslations() {
      if (window.i18n) {
        window.i18n.applyTranslations();
        window.i18n.renderLanguageSwitcher("langSwitcher");
      }
      renderTable();
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        showStatus(tf("cash.loadingStatus", { tenantId }), "info");

        const cashRes = await apiGet(`/cash?tenant_id=${tenantId}`);
        cashData = extractList(cashRes, ["cash", "data", "rows"]).map(normalizeCashRow);

        renderTable();

        showStatus(
          tf("cash.loadedStatus", { tenantId, count: cashData.length }),
          "success"
        );
      } catch (err) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="9" class="empty">${escapeHtml(t("cash.loadErrorRow"))}</td>
          </tr>
        `;
        showStatus(tf("cash.loadErrorStatus", { error: Ui.translateError(err.message) }), "error");
      }
    }

    function bindEvents() {
      els.searchInput.addEventListener("input", renderTable);
      els.typeFilter.addEventListener("change", renderTable);
      els.paymentFilter.addEventListener("change", renderTable);

      els.dateFrom.addEventListener("change", () => {
        clearActivePeriod();
        renderTable();
      });

      els.dateTo.addEventListener("change", () => {
        clearActivePeriod();
        renderTable();
      });

      els.periodTodayBtn.addEventListener("click", () => setPeriod("today"));
      els.periodWeekBtn.addEventListener("click", () => setPeriod("week"));
      els.periodMonthBtn.addEventListener("click", () => setPeriod("month"));

      els.refreshBtn.addEventListener("click", loadData);

      document.addEventListener("app:language-changed", () => {
        refreshStaticTranslations();
      });
    }

    function bootstrap() {
      parseUser();
      bindEvents();
      if (window.i18n) {
        window.i18n.applyTranslations();
        window.i18n.renderLanguageSwitcher("langSwitcher");
      }
      loadData();
    }

    bootstrap();
  </script>
</body>
</html>
