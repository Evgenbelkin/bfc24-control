<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Товары</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-secondary{
      background:#f8fafc;
      color:var(--text);
      border:1px solid var(--line);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, textarea:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    textarea{
      min-height:92px;
      resize:vertical;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:end;
      margin-top:18px;
    }

    .toolbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:collapse;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    @media (max-width: 980px){
      .form-grid,
      .stats,
      .toolbar{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">Товары</div>
      <div class="top-actions">
        <button class="btn btn-light" onclick="goBack()">Назад</button>
        <button class="btn btn-light" onclick="logout()">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" id="formTitle">Создать товар</h2>
      <div class="muted">Карточка товара для приёмки, продажи, списания и остатков.</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Товаров</div>
          <div class="stat-value" id="itemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Tenant ID</div>
          <div class="stat-value" id="tenantValue">1</div>
        </div>
      </div>

      <form id="itemForm" autocomplete="off" style="margin-top:18px;">
        <div class="form-grid">
          <div class="field">
            <label for="name">Название</label>
            <input id="name" type="text" placeholder="Например: Тест товар SaaS" />
          </div>

          <div class="field">
            <label for="sku">Артикул / SKU</label>
            <input id="sku" type="text" placeholder="Например: SKU-001" />
          </div>

          <div class="field">
            <label for="barcode">Штрихкод</label>
            <input id="barcode" type="text" placeholder="Например: 1234567890123" />
          </div>

          <div class="field">
            <label for="purchasePrice">Закупочная цена</label>
            <input id="purchasePrice" type="number" step="0.01" min="0" value="0" />
          </div>

          <div class="field">
            <label for="salePrice">Цена продажи</label>
            <input id="salePrice" type="number" step="0.01" min="0" value="0" />
          </div>

          <div class="field">
            <label for="unit">Единица</label>
            <input id="unit" type="text" placeholder="Например: pcs" value="pcs" />
          </div>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="searchInput">Поиск</label>
            <input id="searchInput" type="text" placeholder="Поиск по названию, артикулу, штрихкоду" />
          </div>

          <div class="toolbar-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Сохранить</button>
            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">Отменить редактирование</button>
            <button type="button" class="btn btn-light" id="refreshBtn">Обновить список</button>
          </div>
        </div>
      </form>

      <div id="pageStatus" class="status info"></div>
      <div id="submitStatus" class="status"></div>
    </div>

    <div class="card">
      <h2 class="card-title">Список товаров</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Название</th>
              <th>Артикул / SKU</th>
              <th>Штрихкод</th>
              <th>Ед.</th>
              <th>Закупка</th>
              <th>Продажа</th>
              <th>Активно</th>
              <th>Дата</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="10" class="empty">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const FALLBACK_TENANT_ID = 1;

    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    let authUser = null;
    let itemsData = [];
    let editId = null;

    const els = {
      formTitle: document.getElementById("formTitle"),
      itemForm: document.getElementById("itemForm"),
      name: document.getElementById("name"),
      sku: document.getElementById("sku"),
      barcode: document.getElementById("barcode"),
      purchasePrice: document.getElementById("purchasePrice"),
      salePrice: document.getElementById("salePrice"),
      unit: document.getElementById("unit"),
      searchInput: document.getElementById("searchInput"),
      saveBtn: document.getElementById("saveBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      submitStatus: document.getElementById("submitStatus"),
      itemsCount: document.getElementById("itemsCount"),
      tenantValue: document.getElementById("tenantValue")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== "") {
        return Number(authUser.tenant_id);
      }
      return FALLBACK_TENANT_ID;
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      };
    }

    function showStatus(el, text, type = "info") {
      el.className = "status show " + type;
      el.textContent = text;
    }

    function hideStatus(el) {
      el.className = "status";
      el.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString("ru-RU");
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    async function apiGet(path) {
      const res = await fetch(API_BASE + path, {
        method: "GET",
        headers: authHeaders()
      });

      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!res.ok) {
        throw new Error(data.error || data.message || ("HTTP " + res.status));
      }

      return data;
    }

    async function apiPost(path, body) {
      const res = await fetch(API_BASE + path, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!res.ok) {
        throw new Error(data.error || data.message || ("HTTP " + res.status));
      }

      return data;
    }

    async function apiPut(path, body) {
      const res = await fetch(API_BASE + path, {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!res.ok) {
        throw new Error(data.error || data.message || ("HTTP " + res.status));
      }

      return data;
    }

    function normalizeItem(row) {
      return {
        id: row.id,
        name: row.name || row.item_name || "",
        sku: row.sku || row.vendor_code || row.article || "",
        barcode: row.barcode || "",
        unit: row.unit || "pcs",
        purchase_price: Number(row.purchase_price ?? row.cost_price ?? 0),
        sale_price: Number(row.sale_price ?? row.price ?? 0),
        is_active: row.is_active === false ? false : true,
        created_at: row.created_at || row.date || null
      };
    }

    function resetForm() {
      editId = null;
      els.formTitle.textContent = "Создать товар";
      els.saveBtn.textContent = "Сохранить";
      els.cancelEditBtn.style.display = "none";
      els.name.value = "";
      els.sku.value = "";
      els.barcode.value = "";
      els.purchasePrice.value = "0";
      els.salePrice.value = "0";
      els.unit.value = "pcs";
      hideStatus(els.submitStatus);
    }

    function startEdit(item) {
      editId = item.id;
      els.formTitle.textContent = `Редактировать товар #${item.id}`;
      els.saveBtn.textContent = "Сохранить изменения";
      els.cancelEditBtn.style.display = "inline-flex";
      els.name.value = item.name || "";
      els.sku.value = item.sku || "";
      els.barcode.value = item.barcode || "";
      els.purchasePrice.value = String(item.purchase_price ?? 0);
      els.salePrice.value = String(item.sale_price ?? 0);
      els.unit.value = item.unit || "pcs";
      hideStatus(els.submitStatus);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();

      return itemsData.filter(row => {
        if (!search) return true;
        const text = [
          row.name,
          row.sku,
          row.barcode,
          row.unit
        ].join(" ").toLowerCase();

        return text.includes(search);
      });
    }

    function renderTable() {
      const rows = getFilteredRows();
      els.itemsCount.textContent = String(itemsData.length);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty">Нет данных</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.id)}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.sku)}</td>
          <td>${escapeHtml(row.barcode)}</td>
          <td>${escapeHtml(row.unit)}</td>
          <td>${escapeHtml(formatMoney(row.purchase_price))}</td>
          <td>${escapeHtml(formatMoney(row.sale_price))}</td>
          <td>${row.is_active ? "Да" : "Нет"}</td>
          <td>${escapeHtml(formatDate(row.created_at))}</td>
          <td>
            <div class="row-actions">
              <button type="button" class="btn btn-secondary" onclick="editItem('${escapeHtml(row.id)}')">Редактировать</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        els.tenantValue.textContent = String(tenantId);
        showStatus(els.pageStatus, `Загрузка товаров...\nTenant ID: ${tenantId}`, "info");

        const data = await apiGet(`/items?tenant_id=${tenantId}`);
        itemsData = extractList(data, ["items", "data", "rows"]).map(normalizeItem);

        renderTable();

        showStatus(
          els.pageStatus,
          `Данные загружены.\nTenant ID: ${tenantId}\nТоваров: ${itemsData.length}`,
          "success"
        );
      } catch (err) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty">Ошибка загрузки данных</td>
          </tr>
        `;
        showStatus(els.pageStatus, "Ошибка: " + err.message, "error");
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideStatus(els.submitStatus);

      try {
        const tenantId = getTenantId();

        const name = (els.name.value || "").trim();
        const sku = (els.sku.value || "").trim();
        const barcode = (els.barcode.value || "").trim();
        const purchase_price = Number(els.purchasePrice.value || 0);
        const sale_price = Number(els.salePrice.value || 0);
        const unit = (els.unit.value || "").trim() || "pcs";

        if (!name) {
          throw new Error("Название обязательно");
        }

        if (!Number.isFinite(purchase_price) || purchase_price < 0) {
          throw new Error("Закупочная цена должна быть 0 или больше");
        }

        if (!Number.isFinite(sale_price) || sale_price < 0) {
          throw new Error("Цена продажи должна быть 0 или больше");
        }

        const body = {
          tenant_id: tenantId,
          name,
          sku: sku || null,
          barcode: barcode || null,
          unit,
          purchase_price,
          sale_price
        };

        if (editId) {
          showStatus(els.submitStatus, `Сохраняю изменения товара #${editId}...`, "info");
          await apiPut(`/items/${editId}`, body);
          showStatus(els.submitStatus, `Товар #${editId} успешно обновлён`, "success");
        } else {
          showStatus(els.submitStatus, "Создаю товар...", "info");
          await apiPost("/items", body);
          showStatus(els.submitStatus, "Товар успешно создан", "success");
        }

        resetForm();
        await loadData();
      } catch (err) {
        showStatus(els.submitStatus, "Ошибка сохранения: " + err.message, "error");
      }
    }

    function bindEvents() {
      els.itemForm.addEventListener("submit", handleSubmit);
      els.searchInput.addEventListener("input", renderTable);
      els.cancelEditBtn.addEventListener("click", resetForm);
      els.refreshBtn.addEventListener("click", loadData);
    }

    function bootstrap() {
      parseUser();
      bindEvents();
      loadData();
    }

    function editItem(id) {
      const found = itemsData.find(x => String(x.id) === String(id));
      if (!found) return;
      startEdit(found);
    }

    bootstrap();
    window.editItem = editItem;
  </script>
</body>
</html>
