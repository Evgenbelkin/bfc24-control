<!DOCTYPE html>
<html lang="ru" translate="no" data-page-title-i18n="items.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Товары</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1480px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .lang-switcher{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .lang-switcher button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      min-width:56px;
    }

    .lang-switcher button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-secondary{
      background:#f8fafc;
      color:var(--text);
      border:1px solid var(--line);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-top:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .field.span-2{
      grid-column:span 2;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, textarea:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    input[readonly]{
      background:#f8fafc;
      color:#374151;
    }

    textarea{
      min-height:92px;
      resize:vertical;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:end;
      margin-top:18px;
    }

    .toolbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .calc-note{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
    }

    table{
      width:100%;
      min-width:1300px;
      border-collapse:collapse;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .item-name{
      font-weight:700;
      margin-bottom:4px;
    }

    .item-sub{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }

    .dim-lines{
      display:flex;
      flex-direction:column;
      gap:4px;
      color:#374151;
      font-size:13px;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    @media (max-width: 1100px){
      .form-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .toolbar{
        grid-template-columns:1fr;
      }
      .stats{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 780px){
      .form-grid{
        grid-template-columns:1fr;
      }
      .field.span-2{
        grid-column:span 1;
      }
      .title{
        font-size:24px;
      }
      .wrap{
        padding:16px 12px 32px;
      }
      .topbar{
        align-items:flex-start;
      }
      .topbar-right{
        width:100%;
        justify-content:space-between;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="items.heading">Товары</div>

      <div class="topbar-right">
        <div id="langSwitcher" class="lang-switcher"></div>

        <div class="top-actions">
          <button class="btn btn-light" onclick="goBack()" data-i18n="items.backButton">Назад</button>
          <button class="btn btn-light" onclick="logout()" data-i18n="items.logoutButton">Выйти</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" id="formTitle">Создать товар</h2>
      <div class="muted" data-i18n="items.subtitle">Карточка товара для приёмки, продажи, списания и остатков.</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="items.statsItems">Товаров</div>
          <div class="stat-value" id="itemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Активных</div>
          <div class="stat-value" id="activeItemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="items.statsTenant">Tenant ID</div>
          <div class="stat-value" id="tenantValue">1</div>
        </div>
      </div>

      <form id="itemForm" autocomplete="off">
        <div class="form-grid">
          <div class="field span-2">
            <label for="name" data-i18n="items.nameLabel">Название</label>
            <input id="name" type="text" data-i18n-placeholder="items.namePlaceholder" placeholder="Например: Тест товар SaaS" />
          </div>

          <div class="field">
            <label for="brand">Артикул фабрики</label>
            <input id="brand" type="text" placeholder="Например: XJ-2048" />
          </div>

          <div class="field">
            <label for="category">Фабрика</label>
            <input id="category" type="text" placeholder="Например: Shenzhen Factory" />
          </div>

          <div class="field">
            <label for="sku" data-i18n="items.skuLabel">Артикул / SKU</label>
            <input id="sku" type="text" data-i18n-placeholder="items.skuPlaceholder" placeholder="Например: SKU-001" />
          </div>

          <div class="field">
            <label for="barcode" data-i18n="items.barcodeLabel">Штрихкод</label>
            <input id="barcode" type="text" data-i18n-placeholder="items.barcodePlaceholder" placeholder="Например: 1234567890123" />
          </div>

          <div class="field">
            <label for="purchasePrice" data-i18n="items.purchasePriceLabel">Закупочная цена</label>
            <input id="purchasePrice" type="number" step="0.01" min="0" value="0" />
          </div>

          <div class="field">
            <label for="salePrice" data-i18n="items.salePriceLabel">Цена продажи</label>
            <input id="salePrice" type="number" step="0.01" min="0" value="0" />
          </div>

          <div class="field">
            <label for="unit" data-i18n="items.unitLabel">Единица</label>
            <input id="unit" type="text" data-i18n-placeholder="items.unitPlaceholder" placeholder="Например: pcs" value="pcs" />
          </div>

          <div class="field full">
            <label for="description">Описание</label>
            <textarea id="description" placeholder="Краткое описание товара"></textarea>
          </div>

          <div class="field">
            <label for="weightKg">Вес коробки, кг</label>
            <input id="weightKg" type="number" step="0.001" min="0" placeholder="Например: 12.5" />
          </div>

          <div class="field">
            <label for="lengthCm">Длина коробки, см</label>
            <input id="lengthCm" type="number" step="0.01" min="0" placeholder="Например: 60" />
          </div>

          <div class="field">
            <label for="widthCm">Ширина коробки, см</label>
            <input id="widthCm" type="number" step="0.01" min="0" placeholder="Например: 40" />
          </div>

          <div class="field">
            <label for="heightCm">Высота коробки, см</label>
            <input id="heightCm" type="number" step="0.01" min="0" placeholder="Например: 35" />
          </div>

          <div class="field">
            <label for="volumeM3">Объём коробки, м³</label>
            <input id="volumeM3" type="text" readonly placeholder="Рассчитывается автоматически" />
            <div class="calc-note">Объём считается автоматически по размерам коробки.</div>
          </div>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="searchInput" data-i18n="items.searchLabel">Поиск</label>
            <input id="searchInput" type="text" data-i18n-placeholder="items.searchPlaceholder" placeholder="Поиск по названию, артикулу, штрихкоду" />
          </div>

          <div class="toolbar-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Сохранить</button>
            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">Отменить редактирование</button>
            <button type="button" class="btn btn-light" id="refreshBtn" data-i18n="items.refreshButton">Обновить список</button>
          </div>
        </div>
      </form>

      <div id="pageStatus" class="status info"></div>
      <div id="submitStatus" class="status"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="items.listTitle">Список товаров</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="items.tableId">ID</th>
              <th data-i18n="items.tableName">Название</th>
              <th data-i18n="items.tableSku">Артикул / SKU</th>
              <th data-i18n="items.tableBarcode">Штрихкод</th>
              <th data-i18n="items.tableUnit">Ед.</th>
              <th data-i18n="items.tablePurchase">Закупка</th>
              <th data-i18n="items.tableSale">Продажа</th>
              <th>Характеристики</th>
              <th data-i18n="items.tableActive">Активно</th>
              <th data-i18n="items.tableDate">Дата</th>
              <th data-i18n="items.tableActions">Действия</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="11" class="empty" data-i18n="items.loadingData">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const FALLBACK_TENANT_ID = 1;

    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const token = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: "Bearer " + token } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      },
      put(path, body) {
        if (window.API && typeof window.API.put === "function") {
          return window.API.put(path, body);
        }
        return requestFallback("PUT", path, body);
      }
    };

    let authUser = null;
    let itemsData = [];
    let editId = null;

    let pageStatusState = null;
    let submitStatusState = null;

    const els = {
      formTitle: document.getElementById("formTitle"),
      itemForm: document.getElementById("itemForm"),
      name: document.getElementById("name"),
      brand: document.getElementById("brand"),
      category: document.getElementById("category"),
      sku: document.getElementById("sku"),
      barcode: document.getElementById("barcode"),
      purchasePrice: document.getElementById("purchasePrice"),
      salePrice: document.getElementById("salePrice"),
      unit: document.getElementById("unit"),
      description: document.getElementById("description"),
      weightKg: document.getElementById("weightKg"),
      lengthCm: document.getElementById("lengthCm"),
      widthCm: document.getElementById("widthCm"),
      heightCm: document.getElementById("heightCm"),
      volumeM3: document.getElementById("volumeM3"),
      searchInput: document.getElementById("searchInput"),
      saveBtn: document.getElementById("saveBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      submitStatus: document.getElementById("submitStatus"),
      itemsCount: document.getElementById("itemsCount"),
      activeItemsCount: document.getElementById("activeItemsCount"),
      tenantValue: document.getElementById("tenantValue")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== '') {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(typeof FALLBACK_TENANT_ID !== 'undefined' ? FALLBACK_TENANT_ID : 1);
    }

    function showStatus(el, text, type = "info") {
      el.className = "status show " + type;
      el.textContent = text;
    }

    function hideStatus(el) {
      el.className = "status";
      el.textContent = "";
    }

    function setPageStatus(key, vars, type) {
      pageStatusState = { key, vars: vars || {}, type };
      showStatus(els.pageStatus, i18n.format(key, vars || {}), type);
    }

    function clearPageStatus() {
      pageStatusState = null;
      hideStatus(els.pageStatus);
    }

    function setSubmitStatus(key, vars, type) {
      submitStatusState = { key, vars: vars || {}, type };
      showStatus(els.submitStatus, i18n.format(key, vars || {}), type);
    }

    function clearSubmitStatus() {
      submitStatusState = null;
      hideStatus(els.submitStatus);
    }

    function restoreStatusesAfterLanguageChange() {
      if (pageStatusState) {
        showStatus(
          els.pageStatus,
          i18n.format(pageStatusState.key, pageStatusState.vars || {}),
          pageStatusState.type
        );
      }
      if (submitStatusState) {
        showStatus(
          els.submitStatus,
          i18n.format(submitStatusState.key, submitStatusState.vars || {}),
          submitStatusState.type
        );
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      return Ui.displayDateTime(value);
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function formatMetric(value, digits = 2) {
      if (value === null || value === undefined || value === "") return "—";
      const n = Number(value);
      if (!Number.isFinite(n)) return "—";
      return n.toFixed(digits).replace(/\.?0+$/, "");
    }

    function computeVolumeCm3(lengthCm, widthCm, heightCm) {
      if (
        lengthCm === null || widthCm === null || heightCm === null ||
        !Number.isFinite(lengthCm) || !Number.isFinite(widthCm) || !Number.isFinite(heightCm) ||
        lengthCm <= 0 || widthCm <= 0 || heightCm <= 0
      ) {
        return null;
      }
      return lengthCm * widthCm * heightCm;
    }

    function formatVolumeM3(volumeCm3) {
      if (volumeCm3 === null || volumeCm3 === undefined || volumeCm3 === "") return "";
      const m3 = Number(volumeCm3) / 1000000;
      if (!Number.isFinite(m3)) return "";
      return m3.toFixed(4).replace(/\.?0+$/, "");
    }

    function readOptionalNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    async function apiGet(path) {
      return ApiBridge.get(path);
    }

    async function apiPost(path, body) {
      return ApiBridge.post(path, body);
    }

    async function apiPut(path, body) {
      return ApiBridge.put(path, body);
    }

    function normalizeItem(row) {
      return {
        id: row.id,
        name: row.name || row.item_name || "",
        brand: row.brand || "",
        category: row.category || "",
        sku: row.sku || row.vendor_code || row.article || "",
        barcode: row.barcode || "",
        unit: row.unit || "pcs",
        purchase_price: Number(row.purchase_price ?? row.cost_price ?? 0),
        sale_price: Number(row.sale_price ?? row.price ?? 0),
        description: row.description || "",
        weight_kg: row.weight_kg === null || row.weight_kg === undefined ? null : Number(row.weight_kg),
        volume_cm3: row.volume_cm3 === null || row.volume_cm3 === undefined ? Number(row.volume_ml ?? 0) || null : Number(row.volume_cm3),
        length_cm: row.length_cm === null || row.length_cm === undefined ? null : Number(row.length_cm),
        width_cm: row.width_cm === null || row.width_cm === undefined ? null : Number(row.width_cm),
        height_cm: row.height_cm === null || row.height_cm === undefined ? null : Number(row.height_cm),
        is_active: row.is_active === false ? false : true,
        created_at: row.created_at || row.date || null
      };
    }

    function getFormTitleText() {
      if (editId) {
        return i18n.format("items.formEditTitle", { id: editId });
      }
      return i18n.t("items.formCreateTitle");
    }

    function getSaveButtonText() {
      return editId ? i18n.t("items.saveChangesButton") : i18n.t("items.saveButton");
    }

    function syncFormTexts() {
      els.formTitle.textContent = getFormTitleText();
      els.saveBtn.textContent = getSaveButtonText();
      els.cancelEditBtn.textContent = i18n.t("items.cancelEditButton");
    }

    function updateVolumeDisplay() {
      const length = readOptionalNumber(els.lengthCm.value);
      const width = readOptionalNumber(els.widthCm.value);
      const height = readOptionalNumber(els.heightCm.value);
      const volumeCm3 = computeVolumeCm3(length, width, height);
      els.volumeM3.value = volumeCm3 === null ? "" : `${formatVolumeM3(volumeCm3)} м³`;
      return volumeCm3;
    }

    function resetForm() {
      editId = null;
      syncFormTexts();
      els.cancelEditBtn.style.display = "none";
      els.name.value = "";
      els.brand.value = "";
      els.category.value = "";
      els.sku.value = "";
      els.barcode.value = "";
      els.purchasePrice.value = "0";
      els.salePrice.value = "0";
      els.unit.value = "pcs";
      els.description.value = "";
      els.weightKg.value = "";
      els.lengthCm.value = "";
      els.widthCm.value = "";
      els.heightCm.value = "";
      updateVolumeDisplay();
      clearSubmitStatus();
    }

    function startEdit(item) {
      editId = item.id;
      syncFormTexts();
      els.cancelEditBtn.style.display = "inline-flex";
      els.name.value = item.name || "";
      els.brand.value = item.brand || "";
      els.category.value = item.category || "";
      els.sku.value = item.sku || "";
      els.barcode.value = item.barcode || "";
      els.purchasePrice.value = String(item.purchase_price ?? 0);
      els.salePrice.value = String(item.sale_price ?? 0);
      els.unit.value = item.unit || "pcs";
      els.description.value = item.description || "";
      els.weightKg.value = item.weight_kg === null ? "" : String(item.weight_kg);
      els.lengthCm.value = item.length_cm === null ? "" : String(item.length_cm);
      els.widthCm.value = item.width_cm === null ? "" : String(item.width_cm);
      els.heightCm.value = item.height_cm === null ? "" : String(item.height_cm);
      updateVolumeDisplay();
      clearSubmitStatus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();

      return itemsData.filter((row) => {
        if (!search) return true;
        const text = [
          row.name,
          row.brand,
          row.category,
          row.sku,
          row.barcode,
          row.description,
          row.unit
        ].join(" ").toLowerCase();

        return text.includes(search);
      });
    }

    function getDimensionsText(row) {
      const parts = [];

      if (row.length_cm !== null || row.width_cm !== null || row.height_cm !== null) {
        parts.push(
          `Коробка: ${formatMetric(row.length_cm, 2)} × ${formatMetric(row.width_cm, 2)} × ${formatMetric(row.height_cm, 2)} см`
        );
      }

      if (row.weight_kg !== null) {
        parts.push(`Вес: ${formatMetric(row.weight_kg, 3)} кг`);
      }

      const volumeCm3 = row.volume_cm3;
      if (volumeCm3 !== null) {
        parts.push(`Объём: ${formatVolumeM3(volumeCm3)} м³`);
      }

      return parts.length ? parts : ["—"];
    }

    function renderTable() {
      const rows = getFilteredRows();
      els.itemsCount.textContent = String(itemsData.length);
      els.activeItemsCount.textContent = String(itemsData.filter((row) => row.is_active).length);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="11" class="empty">${escapeHtml(i18n.t("items.noData"))}</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map((row) => {
        const dimensions = getDimensionsText(row);
        return `
          <tr>
            <td>${escapeHtml(row.id)}</td>
            <td>
              <div class="item-name">${escapeHtml(row.name)}</div>
              <div class="item-sub">${escapeHtml([row.category, row.brand].filter(Boolean).join(" / ") || "Фабрика и артикул фабрики не заполнены")}</div>
              <div class="item-sub">${escapeHtml(row.description || "")}</div>
            </td>
            <td>${escapeHtml(row.sku)}</td>
            <td>${escapeHtml(row.barcode)}</td>
            <td>${escapeHtml(row.unit)}</td>
            <td>${escapeHtml(formatMoney(row.purchase_price))}</td>
            <td>${escapeHtml(formatMoney(row.sale_price))}</td>
            <td>
              <div class="dim-lines">
                ${dimensions.map((line) => `<div>${escapeHtml(line)}</div>`).join("")}
              </div>
            </td>
            <td>${row.is_active ? escapeHtml(i18n.t("items.activeYes")) : escapeHtml(i18n.t("items.activeNo"))}</td>
            <td>${escapeHtml(formatDate(row.created_at))}</td>
            <td>
              <div class="row-actions">
                <button type="button" class="btn btn-secondary" onclick="editItem('${escapeHtml(row.id)}')">${escapeHtml(i18n.t("items.editButton"))}</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function renderLoadingRow() {
      els.tbody.innerHTML = `
        <tr>
          <td colspan="11" class="empty">${escapeHtml(i18n.t("items.loadingData"))}</td>
        </tr>
      `;
    }

    function renderLoadErrorRow() {
      els.tbody.innerHTML = `
        <tr>
          <td colspan="11" class="empty">${escapeHtml(i18n.t("items.loadErrorRow"))}</td>
        </tr>
      `;
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        els.tenantValue.textContent = String(tenantId);

        renderLoadingRow();
        setPageStatus("items.loadingStatus", { tenantId }, "info");

        const data = await apiGet(`/items?tenant_id=${tenantId}`);
        itemsData = extractList(data, ["items", "data", "rows"]).map(normalizeItem);

        renderTable();

        setPageStatus("items.loadedStatus", {
          tenantId,
          count: itemsData.length
        }, "success");
      } catch (err) {
        renderLoadErrorRow();
        setPageStatus("items.loadErrorStatus", {
          error: Ui.translateError(err.message)
        }, "error");
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      clearSubmitStatus();

      try {
        const tenantId = getTenantId();

        const name = (els.name.value || "").trim();
        const brand = (els.brand.value || "").trim();
        const category = (els.category.value || "").trim();
        const sku = (els.sku.value || "").trim();
        const barcode = (els.barcode.value || "").trim();
        const purchase_price = Number(els.purchasePrice.value || 0);
        const sale_price = Number(els.salePrice.value || 0);
        const unit = (els.unit.value || "").trim() || "pcs";
        const description = (els.description.value || "").trim();

        const weight_kg = readOptionalNumber(els.weightKg.value);
        const length_cm = readOptionalNumber(els.lengthCm.value);
        const width_cm = readOptionalNumber(els.widthCm.value);
        const height_cm = readOptionalNumber(els.heightCm.value);

        if (!name) {
          throw new Error(i18n.t("items.nameRequired"));
        }

        if (!Number.isFinite(purchase_price) || purchase_price < 0) {
          throw new Error(i18n.t("items.purchasePriceInvalid"));
        }

        if (!Number.isFinite(sale_price) || sale_price < 0) {
          throw new Error(i18n.t("items.salePriceInvalid"));
        }

        for (const [value, message] of [
          [weight_kg, "Вес коробки должен быть 0 или больше"],
          [length_cm, "Длина коробки должна быть 0 или больше"],
          [width_cm, "Ширина коробки должна быть 0 или больше"],
          [height_cm, "Высота коробки должна быть 0 или больше"]
        ]) {
          if (value !== null && value < 0) {
            throw new Error(message);
          }
        }

        const body = {
          tenant_id: tenantId,
          name,
          brand: brand || null,
          category: category || null,
          sku: sku || null,
          barcode: barcode || null,
          unit,
          purchase_price,
          sale_price,
          description: description || null,
          weight_kg,
          length_cm,
          width_cm,
          height_cm
        };

        if (editId) {
          setSubmitStatus("items.savingUpdate", { id: editId }, "info");
          await apiPut(`/items/${editId}`, body);
          setSubmitStatus("items.updatedSuccess", { id: editId }, "success");
        } else {
          setSubmitStatus("items.savingCreate", {}, "info");
          await apiPost("/items", body);
          setSubmitStatus("items.createdSuccess", {}, "success");
        }

        resetForm();
        await loadData();
      } catch (err) {
        setSubmitStatus("items.saveErrorStatus", {
          error: Ui.translateError(err.message)
        }, "error");
      }
    }

    function bindEvents() {
      els.itemForm.addEventListener("submit", handleSubmit);
      els.searchInput.addEventListener("input", renderTable);
      [els.weightKg, els.lengthCm, els.widthCm, els.heightCm].forEach((node) => {
        node.addEventListener("input", updateVolumeDisplay);
      });
      els.cancelEditBtn.addEventListener("click", resetForm);
      els.refreshBtn.addEventListener("click", loadData);

      document.addEventListener("app:language-changed", () => {
        i18n.applyTranslations();
        syncFormTexts();
        renderTable();
        restoreStatusesAfterLanguageChange();
      });
    }

    function bootstrap() {
      parseUser();
      i18n.applyTranslations();
      i18n.renderLanguageSwitcher("langSwitcher");
      bindEvents();
      syncFormTexts();
      updateVolumeDisplay();
      loadData();
    }

    function editItem(id) {
      const found = itemsData.find(x => String(x.id) === String(id));
      if (!found) return;
      startEdit(found);
    }

    bootstrap();
    window.editItem = editItem;
    window.goBack = goBack;
    window.logout = logout;
  </script>
</body>
</html>
