<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Товары</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);}
    .wrap{max-width:1320px;margin:0 auto;padding:24px 16px 48px;}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .title{font-size:28px;font-weight:700;}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .btn{border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;}
    .btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-hover);}
    .btn-light{background:#fff;color:var(--text);border:1px solid var(--line);}
    .btn-secondary{background:#f8fafc;color:var(--text);border:1px solid var(--line);}
    .card{background:var(--card);border:1px solid #eef1f5;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
    .card-title{font-size:18px;font-weight:700;margin:0 0 14px;}
    .muted{color:var(--muted);font-size:13px;}
    .form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
    .field{display:flex;flex-direction:column;gap:7px;min-width:0;}
    .field.full{grid-column:1/-1;}
    label{font-size:14px;font-weight:700;}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;background:#fff;color:var(--text);outline:none;}
    input:focus,textarea:focus{border-color:#9db8ff;box-shadow:0 0 0 4px rgba(37,99,235,.10);}
    textarea{min-height:92px;resize:vertical;}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;margin-top:18px;}
    .toolbar-actions{display:flex;gap:10px;flex-wrap:wrap;}
    .status{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:14px;display:none;white-space:pre-wrap;}
    .status.show{display:block}
    .status.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
    .status.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
    .status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px;}
    .stat{background:#f8fafc;border:1px solid #e8edf4;border-radius:14px;padding:14px;}
    .stat-label{color:var(--muted);font-size:12px;margin-bottom:6px;}
    .stat-value{font-size:22px;font-weight:800;}
    .table-wrap{overflow:auto;margin-top:10px;}
    table{width:100%;min-width:1200px;border-collapse:collapse;background:#fff;}
    th,td{border-bottom:1px solid #eef1f5;padding:12px 10px;text-align:left;vertical-align:top;font-size:14px;}
    th{background:#f8fafc;font-weight:700;color:#111827;position:sticky;top:0;z-index:1;}
    tr:hover td{background:#fbfdff;}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .empty{text-align:center;color:var(--muted);padding:24px 12px;}
    .lang-switcher{display:flex;gap:4px;}
    .lang-btn{border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700;background:#fff;color:var(--muted);}
    .lang-btn.lang-active{background:var(--primary);color:#fff;border-color:var(--primary);}
    @media(max-width:980px){.form-grid,.stats,.toolbar{grid-template-columns:1fr;}.title{font-size:24px;}.wrap{padding:16px 12px 32px;}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="page_items">Товары</div>
      <div class="top-actions">
        <div id="langSwitcher" class="lang-switcher"></div>
        <button class="btn btn-light" onclick="goBack()" data-i18n="back">Назад</button>
        <button class="btn btn-light" onclick="logout()" data-i18n="logout">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" id="formTitle" data-i18n="form_create_item">Создать товар</h2>
      <div class="muted" data-i18n="item_card_hint">Карточка товара для приёмки, продажи, списания и остатков.</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="stat_items_count">Товаров</div>
          <div class="stat-value" id="itemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="stat_tenant_id">Tenant ID</div>
          <div class="stat-value" id="tenantValue">1</div>
        </div>
      </div>

      <form id="itemForm" autocomplete="off" style="margin-top:18px;">
        <div class="form-grid">
          <div class="field">
            <label for="name" data-i18n="label_name">Название</label>
            <input id="name" type="text" data-i18n-placeholder="ph_name_item" placeholder="Например: Тест товар SaaS" />
          </div>
          <div class="field">
            <label for="sku" data-i18n="label_sku">Артикул / SKU</label>
            <input id="sku" type="text" data-i18n-placeholder="ph_sku" placeholder="Например: SKU-001" />
          </div>
          <div class="field">
            <label for="barcode" data-i18n="label_barcode">Штрихкод</label>
            <input id="barcode" type="text" data-i18n-placeholder="ph_barcode" placeholder="Например: 1234567890123" />
          </div>
          <div class="field">
            <label for="purchasePrice" data-i18n="label_purchase_price">Закупочная цена</label>
            <input id="purchasePrice" type="number" step="0.01" min="0" value="0" />
          </div>
          <div class="field">
            <label for="salePrice" data-i18n="label_sale_price">Цена продажи</label>
            <input id="salePrice" type="number" step="0.01" min="0" value="0" />
          </div>
          <div class="field">
            <label for="unit" data-i18n="label_unit">Единица</label>
            <input id="unit" type="text" data-i18n-placeholder="ph_unit" placeholder="Например: pcs" value="pcs" />
          </div>
        </div>

        <div class="toolbar">
          <div class="field">
            <label for="searchInput" data-i18n="label_search">Поиск</label>
            <input id="searchInput" type="text" data-i18n-placeholder="ph_search_items" placeholder="Поиск по названию, артикулу, штрихкоду" />
          </div>
          <div class="toolbar-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn" data-i18n="save">Сохранить</button>
            <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;" data-i18n="cancel_edit">Отменить редактирование</button>
            <button type="button" class="btn btn-light" id="refreshBtn" data-i18n="refresh_list">Обновить список</button>
          </div>
        </div>
      </form>

      <div id="pageStatus" class="status info"></div>
      <div id="submitStatus" class="status"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="list_items">Список товаров</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="col_id">ID</th>
              <th data-i18n="col_name">Название</th>
              <th data-i18n="col_sku">Артикул / SKU</th>
              <th data-i18n="col_barcode">Штрихкод</th>
              <th data-i18n="col_unit">Ед.</th>
              <th data-i18n="col_purchase">Закупка</th>
              <th data-i18n="col_sale">Продажа</th>
              <th data-i18n="col_active">Активно</th>
              <th data-i18n="col_date">Дата</th>
              <th data-i18n="col_actions">Действия</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="10" class="empty" data-i18n="status_loading">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const FALLBACK_TENANT_ID = 1;

    const token = localStorage.getItem("token");
    if (!token) { window.location.href = "/login.html"; }

    const Ui = window.AppUI || {
      escapeHtml: (v) => String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"),
      translateError: (v) => String(v || i18n.t("status_error")),
      displayDateTime: (v) => {
        if (!v) return "";
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const t = localStorage.getItem("token") || "";
      const res = await fetch(path, {
        method,
        headers: { "Content-Type": "application/json", ...(t ? { Authorization: "Bearer " + t } : {}) },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });
      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      if (!res.ok || data.ok === false) throw new Error(data.error || data.message || ("HTTP " + res.status));
      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const u = JSON.parse(localStorage.getItem("user"));
        if (u && u.tenant_id !== null && u.tenant_id !== undefined && u.tenant_id !== "") return Number(u.tenant_id);
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(f = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const t = window.API.getTenantId();
          if (t !== null && t !== undefined && t !== "") return Number(t);
        }
        return getTenantIdFromStorage(f);
      },
      get(p)        { return window.API?.get    ? window.API.get(p)         : requestFallback("GET",    p); },
      post(p, b)    { return window.API?.post   ? window.API.post(p, b)     : requestFallback("POST",   p, b); },
      put(p, b)     { return window.API?.put    ? window.API.put(p, b)      : requestFallback("PUT",    p, b); },
      patch(p, b)   { return window.API?.patch  ? window.API.patch(p, b)    : requestFallback("PATCH",  p, b); },
      delete(p)     { return window.API?.delete ? window.API.delete(p)      : requestFallback("DELETE", p); }
    };

    let authUser = null;
    let itemsData = [];
    let editId = null;

    const els = {
      formTitle:     document.getElementById("formTitle"),
      itemForm:      document.getElementById("itemForm"),
      name:          document.getElementById("name"),
      sku:           document.getElementById("sku"),
      barcode:       document.getElementById("barcode"),
      purchasePrice: document.getElementById("purchasePrice"),
      salePrice:     document.getElementById("salePrice"),
      unit:          document.getElementById("unit"),
      searchInput:   document.getElementById("searchInput"),
      saveBtn:       document.getElementById("saveBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      refreshBtn:    document.getElementById("refreshBtn"),
      tbody:         document.getElementById("tbody"),
      pageStatus:    document.getElementById("pageStatus"),
      submitStatus:  document.getElementById("submitStatus"),
      itemsCount:    document.getElementById("itemsCount"),
      tenantValue:   document.getElementById("tenantValue")
    };

    function goBack()  { window.location.href = "/index.html"; }
    function logout()  { localStorage.removeItem("token"); localStorage.removeItem("user"); window.location.href = "/login.html"; }

    function parseUser() {
      try { authUser = JSON.parse(localStorage.getItem("user")); } catch { authUser = null; }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== '') {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(typeof FALLBACK_TENANT_ID !== 'undefined' ? FALLBACK_TENANT_ID : 1);
    }

    function showStatus(el, text, type = "info") { el.className = "status show " + type; el.textContent = text; }
    function hideStatus(el) { el.className = "status"; el.textContent = ""; }

    function escapeHtml(v) {
      return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function formatDate(v) { return Ui.displayDateTime(v); }

    function formatMoney(v) {
      const n = Number(v || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];
      for (const k of keys) { if (Array.isArray(data[k])) return data[k]; }
      for (const v of Object.values(data)) { if (Array.isArray(v)) return v; }
      return [];
    }

    async function apiGet(p)       { return ApiBridge.get(p); }
    async function apiPost(p, b)   { return ApiBridge.post(p, b); }
    async function apiPut(p, b)    { return ApiBridge.put(p, b); }

    function normalizeItem(row) {
      return {
        id: row.id,
        name: row.name || row.item_name || "",
        sku: row.sku || row.vendor_code || row.article || "",
        barcode: row.barcode || "",
        unit: row.unit || "pcs",
        purchase_price: Number(row.purchase_price ?? row.cost_price ?? 0),
        sale_price: Number(row.sale_price ?? row.price ?? 0),
        is_active: row.is_active === false ? false : true,
        created_at: row.created_at || row.date || null
      };
    }

    function resetForm() {
      editId = null;
      els.formTitle.textContent = i18n.t("form_create_item");
      els.saveBtn.textContent   = i18n.t("save");
      els.cancelEditBtn.style.display = "none";
      els.name.value = ""; els.sku.value = ""; els.barcode.value = "";
      els.purchasePrice.value = "0"; els.salePrice.value = "0"; els.unit.value = "pcs";
      hideStatus(els.submitStatus);
    }

    function startEdit(item) {
      editId = item.id;
      els.formTitle.textContent = `${i18n.t("form_edit_item")} #${item.id}`;
      els.saveBtn.textContent   = i18n.t("save_changes");
      els.cancelEditBtn.style.display = "inline-flex";
      els.name.value          = item.name || "";
      els.sku.value           = item.sku || "";
      els.barcode.value       = item.barcode || "";
      els.purchasePrice.value = String(item.purchase_price ?? 0);
      els.salePrice.value     = String(item.sale_price ?? 0);
      els.unit.value          = item.unit || "pcs";
      hideStatus(els.submitStatus);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      return itemsData.filter(row => {
        if (!search) return true;
        return [row.name, row.sku, row.barcode, row.unit].join(" ").toLowerCase().includes(search);
      });
    }

    function renderTable() {
      const rows = getFilteredRows();
      els.itemsCount.textContent = String(itemsData.length);

      if (!rows.length) {
        els.tbody.innerHTML = `<tr><td colspan="10" class="empty">${i18n.t("status_no_data")}</td></tr>`;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.id)}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.sku)}</td>
          <td>${escapeHtml(row.barcode)}</td>
          <td>${escapeHtml(row.unit)}</td>
          <td>${escapeHtml(formatMoney(row.purchase_price))}</td>
          <td>${escapeHtml(formatMoney(row.sale_price))}</td>
          <td>${row.is_active ? i18n.t("yes") : i18n.t("no")}</td>
          <td>${escapeHtml(formatDate(row.created_at))}</td>
          <td>
            <div class="row-actions">
              <button type="button" class="btn btn-secondary" onclick="editItem('${escapeHtml(row.id)}')">${i18n.t("edit")}</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        els.tenantValue.textContent = String(tenantId);
        showStatus(els.pageStatus, `${i18n.t("loading_data")}\nTenant ID: ${tenantId}`, "info");

        const data = await apiGet(`/items?tenant_id=${tenantId}`);
        itemsData = extractList(data, ["items", "data", "rows"]).map(normalizeItem);

        renderTable();
        showStatus(
          els.pageStatus,
          `${i18n.t("data_loaded")}\nTenant ID: ${tenantId}\n${i18n.t("stat_items_count")}: ${itemsData.length}`,
          "success"
        );
      } catch (err) {
        els.tbody.innerHTML = `<tr><td colspan="10" class="empty">${i18n.t("load_error")}</td></tr>`;
        showStatus(els.pageStatus, `${i18n.t("status_error")}: ${Ui.translateError(err.message)}`, "error");
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideStatus(els.submitStatus);

      try {
        const tenantId       = getTenantId();
        const name           = (els.name.value || "").trim();
        const sku            = (els.sku.value  || "").trim();
        const barcode        = (els.barcode.value || "").trim();
        const purchase_price = Number(els.purchasePrice.value || 0);
        const sale_price     = Number(els.salePrice.value || 0);
        const unit           = (els.unit.value || "").trim() || "pcs";

        if (!name) throw new Error(i18n.t("err_name_required"));
        if (!Number.isFinite(purchase_price) || purchase_price < 0) throw new Error(i18n.t("err_price_invalid"));
        if (!Number.isFinite(sale_price)     || sale_price < 0)     throw new Error(i18n.t("err_sale_price_invalid"));

        const body = { tenant_id: tenantId, name, sku: sku || null, barcode: barcode || null, unit, purchase_price, sale_price };

        if (editId) {
          showStatus(els.submitStatus, `${i18n.t("status_saving")} #${editId}...`, "info");
          await apiPut(`/items/${editId}`, body);
          showStatus(els.submitStatus, `${i18n.t("msg_item_updated")} #${editId}`, "success");
        } else {
          showStatus(els.submitStatus, i18n.t("status_saving"), "info");
          await apiPost("/items", body);
          showStatus(els.submitStatus, i18n.t("msg_item_created"), "success");
        }

        resetForm();
        await loadData();
      } catch (err) {
        showStatus(els.submitStatus, `${i18n.t("save_error")}: ${Ui.translateError(err.message)}`, "error");
      }
    }

    function bindEvents() {
      els.itemForm.addEventListener("submit", handleSubmit);
      els.searchInput.addEventListener("input", renderTable);
      els.cancelEditBtn.addEventListener("click", resetForm);
      els.refreshBtn.addEventListener("click", loadData);
    }

    function editItem(id) {
      const found = itemsData.find(x => String(x.id) === String(id));
      if (!found) return;
      startEdit(found);
    }

    function bootstrap() {
      parseUser();
      bindEvents();
      loadData();
    }

    bootstrap();
    window.editItem = editItem;
  </script>

  <script>
    i18n.applyTranslations();
    i18n.renderLanguageSwitcher("langSwitcher");
  </script>
</body>
</html>
