<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Долги клиентов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --success:#16a34a;
      --warning:#d97706;
      --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1360px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      transition:.15s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-light:hover{
      border-color:#cbd5e1;
      background:#f8fafc;
    }

    .btn-success{
      background:var(--success);
      color:#fff;
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .filters{
      display:grid;
      grid-template-columns:1.5fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      margin-top:10px;
      max-height:68vh;
      border-radius:12px;
    }

    table{
      width:100%;
      min-width:1200px;
      border-collapse:separate;
      border-spacing:0;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
      background:#fff;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 2px 0 #eef1f5;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .badge-open{
      color:#92400e;
      background:#fff7ed;
      border-color:#fed7aa;
    }

    .badge-partial{
      color:#1d4ed8;
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .badge-paid{
      color:#166534;
      background:#f0fdf4;
      border-color:#bbf7d0;
    }

    .pay-box{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:220px;
    }

    .pay-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .pay-box button{
      width:100%;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    @media (max-width: 980px){
      .filters,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }
    }
  
    .lang-switcher{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .lang-btn{padding:8px 10px;border-radius:10px;border:1px solid #cbd5e1;background:#eef2f7;color:#111827;cursor:pointer;font-size:12px;font-weight:700;line-height:1;}
    .lang-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">Долги клиентов</div>
      <div class="top-actions">
        <div id="langSwitcher" class="lang-switcher"></div>
        <button class="btn btn-light" onclick="goBack()">Назад</button>
        <button class="btn btn-light" onclick="logout()">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Фильтры</h2>

      <div class="filters">
        <div class="field">
          <label for="searchInput">Поиск по клиенту / товару / комментарию</label>
          <input id="searchInput" list="searchSuggestions" type="text" placeholder="Например: Иванов, Тест товар, реализация" autocomplete="off" />
          <datalist id="searchSuggestions"></datalist>
        </div>

        <div class="field">
          <label for="statusFilter">Статус</label>
          <select id="statusFilter">
            <option value="">Все</option>
            <option value="open">Открыт</option>
            <option value="partial">Частично оплачен</option>
            <option value="paid">Оплачен</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button type="button" class="btn btn-primary" id="refreshBtn">Обновить</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Всего долгов</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Открытых</div>
          <div class="stat-value" id="openCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Частично оплачено</div>
          <div class="stat-value" id="partialCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Оплачено</div>
          <div class="stat-value" id="paidCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Остаток к оплате</div>
          <div class="stat-value" id="balanceTotal">0</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>
    </div>

    <div class="card">
      <h2 class="card-title">Список долгов</h2>
      <div class="muted">Можно принимать частичную или полную оплату по каждому долгу.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Клиент</th>
              <th>Товар</th>
              <th>МХ</th>
              <th>Кол-во</th>
              <th>Сумма</th>
              <th>Оплачено</th>
              <th>Остаток</th>
              <th>Статус</th>
              <th>Комментарий</th>
              <th>Дата</th>
              <th>Оплата</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="12" class="empty">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const FALLBACK_TENANT_ID = 1;

    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const authToken = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(authToken ? { Authorization: "Bearer " + authToken } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      }
    };

    let authUser = null;
    let debtsData = [];

    const els = {
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      totalCount: document.getElementById("totalCount"),
      openCount: document.getElementById("openCount"),
      partialCount: document.getElementById("partialCount"),
      paidCount: document.getElementById("paidCount"),
      balanceTotal: document.getElementById("balanceTotal"),
      searchSuggestions: document.getElementById("searchSuggestions")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== "") {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(FALLBACK_TENANT_ID);
    }

    function showStatus(text, type = "info") {
      els.pageStatus.className = "status show " + type;
      els.pageStatus.textContent = text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "0";
      return n % 1 === 0 ? String(n) : n.toFixed(2);
    }

    function formatDate(value) {
      return Ui.displayDateTime(value);
    }

    function getStatusBadge(status) {
      if (status === "paid") {
        return `<span class="badge badge-paid">Оплачен</span>`;
      }
      if (status === "partial") {
        return `<span class="badge badge-partial">Частично оплачен</span>`;
      }
      return `<span class="badge badge-open">Открыт</span>`;
    }

    async function apiGet(path) {
      return ApiBridge.get(path);
    }

    async function apiPost(path, body) {
      return ApiBridge.post(path, body);
    }

    function normalizeDebt(row) {
      return {
        id: row.id,
        counterparty_name:
          row.counterparty_name ||
          row.client_name ||
          row.customer_name ||
          row.counterparty ||
          "",
        item_name:
          row.item_name ||
          row.product_name ||
          row.name ||
          "",
        location_name:
          row.location_name ||
          row.location ||
          "",
        qty:
          row.qty ??
          row.quantity ??
          "",
        initial_amount:
          Number(row.initial_amount ?? row.amount ?? 0),
        paid_amount:
          Number(row.paid_amount ?? 0),
        balance_amount:
          Number(row.balance_amount ?? 0),
        status:
          row.status || "open",
        comment:
          row.comment || "",
        created_at:
          row.created_at || row.date || null
      };
    }

    function rebuildSuggestions() {
      const values = new Set();

      debtsData.forEach(row => {
        [
          row.counterparty_name,
          row.item_name,
          row.location_name,
          row.comment
        ].forEach(value => {
          const text = String(value || "").trim();
          if (text) values.add(text);
        });
      });

      const items = Array.from(values)
        .sort((a, b) => a.localeCompare(b, "ru"))
        .slice(0, 200);

      els.searchSuggestions.innerHTML = items
        .map(value => `<option value="${escapeHtml(value)}"></option>`)
        .join("");
    }

    function updateStats(rows) {
      const totalCount = rows.length;
      const openCount = rows.filter(r => r.status === "open").length;
      const partialCount = rows.filter(r => r.status === "partial").length;
      const paidCount = rows.filter(r => r.status === "paid").length;
      const balanceTotal = rows.reduce((sum, row) => sum + Number(row.balance_amount || 0), 0);

      els.totalCount.textContent = String(totalCount);
      els.openCount.textContent = String(openCount);
      els.partialCount.textContent = String(partialCount);
      els.paidCount.textContent = String(paidCount);
      els.balanceTotal.textContent = formatMoney(balanceTotal);
    }

    function getFilteredRows() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      const status = els.statusFilter.value;

      return debtsData
        .filter(row => !status || row.status === status)
        .filter(row => {
          if (!search) return true;
          const text = [
            row.counterparty_name,
            row.item_name,
            row.location_name,
            row.comment
          ].join(" ").toLowerCase();

          return text.includes(search);
        });
    }

    function renderTable() {
      const rows = getFilteredRows();
      updateStats(rows);

      if (!rows.length) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="12" class="empty">Нет данных</td>
          </tr>
        `;
        return;
      }

      els.tbody.innerHTML = rows.map(row => {
        const payDisabled = row.status === "paid" ? "disabled" : "";
        return `
          <tr>
            <td>${escapeHtml(row.id)}</td>
            <td>${escapeHtml(row.counterparty_name)}</td>
            <td>${escapeHtml(row.item_name)}</td>
            <td>${escapeHtml(row.location_name)}</td>
            <td>${escapeHtml(row.qty)}</td>
            <td>${escapeHtml(formatMoney(row.initial_amount))}</td>
            <td>${escapeHtml(formatMoney(row.paid_amount))}</td>
            <td>${escapeHtml(formatMoney(row.balance_amount))}</td>
            <td>${getStatusBadge(row.status)}</td>
            <td>${escapeHtml(row.comment)}</td>
            <td>${escapeHtml(formatDate(row.created_at))}</td>
            <td>
              <div class="pay-box">
                <div class="pay-row">
                  <input type="number" min="0.01" step="0.01" placeholder="Сумма" id="pay_amount_${escapeHtml(row.id)}" ${payDisabled} />
                  <select id="pay_method_${escapeHtml(row.id)}" ${payDisabled}>
                    <option value="cash">Наличные</option>
                    <option value="card">Карта</option>
                    <option value="transfer">Перевод</option>
                  </select>
                </div>
                <input type="text" placeholder="Комментарий к оплате" id="pay_comment_${escapeHtml(row.id)}" ${payDisabled} />
                <button type="button" class="btn btn-success" onclick="payDebt('${escapeHtml(row.id)}')" ${payDisabled}>Принять оплату</button>
                <div class="small">Остаток: ${escapeHtml(formatMoney(row.balance_amount))}</div>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function loadData() {
      try {
        const tenantId = getTenantId();
        showStatus(`Загрузка долгов...\nTenant ID: ${tenantId}`, "info");

        const data = await apiGet(`/debts?tenant_id=${tenantId}`);
        debtsData = extractList(data, ["debts", "data", "rows"]).map(normalizeDebt);

        rebuildSuggestions();
        renderTable();

        showStatus(`Данные загружены.\nTenant ID: ${tenantId}\nДолгов: ${debtsData.length}`, "success");
      } catch (err) {
        els.tbody.innerHTML = `
          <tr>
            <td colspan="12" class="empty">Ошибка загрузки данных</td>
          </tr>
        `;
        showStatus("Ошибка: " + Ui.translateError(err.message), "error");
      }
    }

    async function payDebt(debtId) {
      try {
        const tenantId = getTenantId();

        const amountEl = document.getElementById(`pay_amount_${debtId}`);
        const methodEl = document.getElementById(`pay_method_${debtId}`);
        const commentEl = document.getElementById(`pay_comment_${debtId}`);

        if (!amountEl) {
          throw new Error("Поле суммы не найдено");
        }

        const amount = Number(amountEl.value);
        if (!amount || amount <= 0) {
          throw new Error("Укажи корректную сумму оплаты");
        }

        const body = {
          tenant_id: tenantId,
          amount,
          payment_method: methodEl ? methodEl.value : "cash",
          comment: commentEl ? ((commentEl.value || "").trim() || null) : null
        };

        showStatus(`Провожу оплату по долгу #${debtId}...\nTenant ID: ${tenantId}`, "info");

        await apiPost(`/debts/${debtId}/pay`, body);

        showStatus(`Оплата по долгу #${debtId} успешно проведена`, "success");
        await loadData();
      } catch (err) {
        showStatus("Ошибка оплаты: " + Ui.translateError(err.message), "error");
      }
    }

    function bindEvents() {
      els.searchInput.addEventListener("input", renderTable);
      els.statusFilter.addEventListener("change", renderTable);
      els.refreshBtn.addEventListener("click", loadData);
    }

    function bootstrap() {
      parseUser();
      i18n.applyTranslations();
      i18n.renderLanguageSwitcher("langSwitcher");
      bindEvents();
      loadData();
    }

    bootstrap();
    window.payDebt = payDebt;
  </script>



</body>
</html>
