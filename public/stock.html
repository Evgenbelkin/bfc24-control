<!DOCTYPE html>
<html lang="ru" translate="no" data-page-title-i18n="stock.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Остатки</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .lang-switcher{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .lang-switcher button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      min-width:56px;
    }

    .lang-switcher button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }
    .btn-primary:hover{background:var(--primary-hover)}

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .filters{
      display:grid;
      grid-template-columns:1.5fr 1fr 1fr auto;
      gap:12px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      background:#fff;
      min-width:900px;
    }

    th, td{
      border-bottom:1px solid #eef1f5;
      padding:12px 10px;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      font-weight:700;
      color:#111827;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fbfdff;
    }

    .qty{
      font-weight:700;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:24px 12px;
    }

    @media (max-width: 900px){
      .filters,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }

      .topbar{
        align-items:flex-start;
      }

      .topbar-right{
        width:100%;
        justify-content:space-between;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" data-i18n="stock.heading">Остатки</div>

      <div class="topbar-right">
        <div id="langSwitcher" class="lang-switcher"></div>

        <div class="top-actions">
          <button class="btn btn-light" onclick="goBack()" data-i18n="stock.backButton">Назад</button>
          <button class="btn btn-light" onclick="logout()" data-i18n="stock.logoutButton">Выйти</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="stock.filtersTitle">Фильтры</h2>

      <div class="filters">
        <div class="field">
          <label for="searchInput" data-i18n="stock.searchLabel">Поиск по товару / артикулу / штрихкоду</label>
          <input id="searchInput" type="text" data-i18n-placeholder="stock.searchPlaceholder" placeholder="Например: Тест, SaaS, SKU, barcode" />
        </div>

        <div class="field">
          <label for="locationFilter" data-i18n="stock.locationFilterLabel">Место хранения</label>
          <select id="locationFilter">
            <option value="" data-i18n="stock.locationFilterAll">Все МХ</option>
          </select>
        </div>

        <div class="field">
          <label for="categoryFilter">Категория</label>
          <select id="categoryFilter">
            <option value="">Все категории</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="stock.actionsLabel">&nbsp;</label>
          <button type="button" class="btn btn-primary" id="refreshBtn" data-i18n="stock.refreshButton">Обновить</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label" data-i18n="stock.statsRows">Строк остатков</div>
          <div class="stat-value" id="rowsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="stock.statsItems">Товаров</div>
          <div class="stat-value" id="itemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="stock.statsLocations">Мест хранения</div>
          <div class="stat-value" id="locationsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="stock.statsQtyTotal">Сумма по фильтру</div>
          <div class="stat-value" id="qtyTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label" data-i18n="stock.statsQtyGrandTotal">Общая сумма</div>
          <div class="stat-value" id="qtyGrandTotal">0</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>
    </div>

    <div class="card">
      <h2 class="card-title" data-i18n="stock.currentStockTitle">Текущие остатки</h2>
      <div class="muted" data-i18n="stock.currentStockSubtitle">Показываются фактические остатки по товарам и местам хранения.</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="stock.tableItem">Товар</th>
              <th>Категория</th>
              <th>Фабрика</th>
              <th>Арт. фабрики</th>
              <th data-i18n="stock.tableSku">Артикул / SKU</th>
              <th data-i18n="stock.tableBarcode">Штрихкод</th>
              <th data-i18n="stock.tableLocation">Место хранения</th>
              <th data-i18n="stock.tableQty">Количество</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="8" class="empty" data-i18n="stock.loadingRows">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>
  <script src="/js/i18n.js"></script>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
      }
    };

    async function requestFallback(method, path, body) {
      const token = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: "Bearer " + token } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      }
    };

    let authUser = null;
    let stockData = [];
    let itemsData = [];
    let locationsData = [];
    let pageStatusState = null;

    const els = {
      searchInput: document.getElementById("searchInput"),
      locationFilter: document.getElementById("locationFilter"),
      categoryFilter: document.getElementById("categoryFilter"),
      refreshBtn: document.getElementById("refreshBtn"),
      tbody: document.getElementById("tbody"),
      pageStatus: document.getElementById("pageStatus"),
      rowsCount: document.getElementById("rowsCount"),
      itemsCount: document.getElementById("itemsCount"),
      locationsCount: document.getElementById("locationsCount"),
      qtyTotal: document.getElementById("qtyTotal"),
      qtyGrandTotal: document.getElementById("qtyGrandTotal")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id !== null && authUser.tenant_id !== undefined && authUser.tenant_id !== "") {
        return Number(authUser.tenant_id);
      }
      return ApiBridge.getTenantId(1);
    }

    function showStatus(text, type = "info") {
      els.pageStatus.className = "status show " + type;
      els.pageStatus.textContent = text;
    }

    function setPageStatus(key, vars, type) {
      pageStatusState = { key, vars: vars || {}, type };
      showStatus(i18n.format(key, vars || {}), type);
    }

    function restoreStatusesAfterLanguageChange() {
      if (pageStatusState) {
        showStatus(i18n.format(pageStatusState.key, pageStatusState.vars || {}), pageStatusState.type);
      }
    }

    function normalize(data, type = "") {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      if (type === "stock") {
        if (Array.isArray(data.stock)) return data.stock;
        if (Array.isArray(data.data)) return data.data;
        if (Array.isArray(data.rows)) return data.rows;
        return [];
      }

      if (type === "items") {
        if (Array.isArray(data.items)) return data.items;
        if (Array.isArray(data.data)) return data.data;
        if (Array.isArray(data.rows)) return data.rows;
        return [];
      }

      if (type === "locations") {
        if (Array.isArray(data.locations)) return data.locations;
        if (Array.isArray(data.data)) return data.data;
        if (Array.isArray(data.rows)) return data.rows;
        return [];
      }

      if (Array.isArray(data.data)) return data.data;
      if (Array.isArray(data.rows)) return data.rows;
      return [];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatNumber(value, digits = 0) {
      const num = Number(value || 0);
      if (digits > 0) return num.toFixed(digits);
      if (Number.isInteger(num)) return String(num);
      return num.toFixed(3);
    }

    async function apiGet(path) {
      return ApiBridge.get(path);
    }

    function renderCategoryFilter() {
  const currentValue = els.categoryFilter.value;

  const categories = [...new Set(
    itemsData
      .map(item => String(item.category_name || "").trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, "ru"));

  const options = categories
    .map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
    .join("");

  els.categoryFilter.innerHTML = `<option value="">Все категории</option>` + options;

  if ([...els.categoryFilter.options].some(opt => String(opt.value) === String(currentValue))) {
    els.categoryFilter.value = currentValue;
  }
}

    function buildRows() {
      return stockData
        .map(stockRow => {
          const itemId = stockRow.item_id ?? stockRow.itemId ?? stockRow.product_id ?? stockRow.productId ?? null;
          const locationId = stockRow.location_id ?? stockRow.locationId ?? null;
          const qty = Number(stockRow.qty ?? stockRow.quantity ?? stockRow.stock_qty ?? 0);

          const item = itemsData.find(i => String(i.id) === String(itemId)) || {};
          const location = locationsData.find(l => String(l.id) === String(locationId)) || {};

          const locationName = location.name || stockRow.location_name || "";
          const locationCode = location.code || stockRow.location_code || "";

          return {
            item_id: itemId,
            item_name: item.name || item.item_name || stockRow.item_name || stockRow.name || "",
            category_name: item.category_name || "",
            factory: item.factory || "",
            factory_article: item.factory_article || "",
            sku: item.sku || item.vendor_code || item.article || item.code || stockRow.sku || "",
            barcode: item.barcode || stockRow.barcode || "",
            location_id: locationId,
            location_name: locationName,
            location_code: locationCode,
            location_display: `${locationName}${locationCode ? " (" + locationCode + ")" : ""}`,
            qty
          };
        })
        .filter(row => Number(row.qty || 0) > 0);
    }

    function renderTable() {
      const search = (els.searchInput.value || "").trim().toLowerCase();
      const selectedLocationId = els.locationFilter.value;
      const selectedCategoryName = (els.categoryFilter.value || "").trim();

      const allRows = buildRows();

      const rows = allRows
        .filter(row => {
          if (!selectedLocationId) return true;
          return String(row.location_id) === String(selectedLocationId);
        })
        .filter(row => {
          if (!selectedCategoryName) return true;
          return String(row.category_name || "").trim() === selectedCategoryName;
        })
        .filter(row => {
          if (!search) return true;
          const text = [
            row.item_name,
            row.category_name,
            row.factory,
            row.factory_article,
            row.sku,
            row.barcode,
            row.location_name,
            row.location_code
          ].join(" ").toLowerCase();
          return text.includes(search);
        })
        .sort((a, b) => {
          const byItem = String(a.item_name || "").localeCompare(String(b.item_name || ""), "ru");
          if (byItem !== 0) return byItem;
          const byLocation = String(a.location_display || "").localeCompare(String(b.location_display || ""), "ru");
          if (byLocation !== 0) return byLocation;
          return Number(b.qty || 0) - Number(a.qty || 0);
        });

      els.rowsCount.textContent = String(rows.length);
      els.itemsCount.textContent = String(new Set(allRows.map(row => String(row.item_id || ""))).size);
      els.locationsCount.textContent = String(new Set(allRows.map(row => String(row.location_id || ""))).size);
      els.qtyTotal.textContent = formatNumber(rows.reduce((sum, row) => sum + Number(row.qty || 0), 0));
      els.qtyGrandTotal.textContent = formatNumber(allRows.reduce((sum, row) => sum + Number(row.qty || 0), 0));

      if (!rows.length) {
        els.tbody.innerHTML = `<tr><td colspan="8" class="empty">${escapeHtml(i18n.t("stock.noRows"))}</td></tr>`;
        return;
      }

      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.item_name || i18n.t("stock.noName"))}</td>
          <td>${escapeHtml(row.category_name || "")}</td>
          <td>${escapeHtml(row.factory || "")}</td>
          <td>${escapeHtml(row.factory_article || "")}</td>
          <td>${escapeHtml(row.sku || "")}</td>
          <td>${escapeHtml(row.barcode || "")}</td>
          <td>${escapeHtml(row.location_display || "")}</td>
          <td class="qty">${escapeHtml(formatNumber(row.qty))}</td>
        </tr>
      `).join("");
    }

    async function loadData() {
      try {
        setPageStatus("stock.loadingStatus", {}, "info");

        const tenantId = getTenantId();

        const [stockRes, itemsRes, locationsRes] = await Promise.all([
          apiGet(`/stock?tenant_id=${tenantId}`),
          apiGet(`/items?tenant_id=${tenantId}`),
          apiGet(`/locations?tenant_id=${tenantId}`)
        ]);

        stockData = normalize(stockRes, "stock");
        itemsData = normalize(itemsRes, "items");
        locationsData = normalize(locationsRes, "locations");

        renderLocationFilter();
        renderCategoryFilter();
        renderTable();

        setPageStatus("stock.loadedStatus", {
          stock: buildRows().length,
          items: itemsData.length,
          locations: locationsData.length,
          batches: 0
        }, "success");
      } catch (err) {
        els.tbody.innerHTML = `<tr><td colspan="8" class="empty">${escapeHtml(i18n.t("stock.rowsLoadError"))}</td></tr>`;
        setPageStatus("stock.loadErrorStatus", {
          error: Ui.translateError(err.message)
        }, "error");
      }
    }

    function bindEvents() {
      els.searchInput.addEventListener("input", renderTable);
      els.locationFilter.addEventListener("change", renderTable);
      els.categoryFilter.addEventListener("change", renderTable);
      els.refreshBtn.addEventListener("click", loadData);

      document.addEventListener("app:language-changed", () => {
        i18n.applyTranslations();
        renderLocationFilter();
        renderCategoryFilter();
        renderTable();
        restoreStatusesAfterLanguageChange();
      });
    }

    function bootstrap() {
      parseUser();
      i18n.applyTranslations();
      i18n.renderLanguageSwitcher("langSwitcher");
      bindEvents();
      loadData();
    }

    bootstrap();

    window.goBack = goBack;
    window.logout = logout;
  </script>
</body>
</html>
