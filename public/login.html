<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin: 0 0 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 6px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .lang-switch button {
      padding: 6px 10px;
      font-size: 12px;
      background: #e2e8f0;
      color: #111;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="lang-switch">
    <button onclick="i18n.setLang('ru')">RU</button>
    <button onclick="i18n.setLang('en')">EN</button>
    <button onclick="i18n.setLang('zh')">中文</button>
  </div>

  <h2 data-i18n="app_title"></h2>

  <div id="error" class="error"></div>

  <input id="username" data-i18n-placeholder="username" />
  <input id="password" type="password" data-i18n-placeholder="password" />

  <button onclick="login()" data-i18n="login_button"></button>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app-ui.js"></script>
<script src="/js/i18n.js"></script>

<script>
const Ui = window.AppUI || {
  escapeHtml: (value) => String(value ?? ""),
  translateError: (value) => String(value || "Ошибка")
};

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorBox = document.getElementById('error');

  errorBox.textContent = '';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!data.ok) {
      errorBox.textContent = Ui.translateError(data.error);
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    if (data.user.role === 'owner') {
      window.location.href = '/owner-dashboard.html';
    } else {
      window.location.href = '/index.html';
    }

  } catch (err) {
    errorBox.textContent = Ui.translateError(err.message);
  }
}

i18n.applyTranslations();
</script>

</body>
</html>
