<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin: 0 0 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>BFC24 CONTROL</h2>

  <div id="error" class="error"></div>

  <input id="username" placeholder="Логин" />
  <input id="password" type="password" placeholder="Пароль" />

  <button onclick="login()">Войти</button>
</div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>

  <script>
    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const token = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: "Bearer " + token } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      },
      put(path, body) {
        if (window.API && typeof window.API.put === "function") {
          return window.API.put(path, body);
        }
        return requestFallback("PUT", path, body);
      },
      patch(path, body) {
        if (window.API && typeof window.API.patch === "function") {
          return window.API.patch(path, body);
        }
        return requestFallback("PATCH", path, body);
      },
      delete(path) {
        if (window.API && typeof window.API.delete === "function") {
          return window.API.delete(path);
        }
        return requestFallback("DELETE", path);
      }
    };

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorBox = document.getElementById('error');

  errorBox.textContent = '';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!data.ok) {
      errorBox.textContent = Ui.translateError(data.error);
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    // 🔥 КЛЮЧЕВОЕ — редирект по роли
    if (data.user.role === 'owner') {
      window.location.href = '/owner-dashboard.html';
    } else {
      window.location.href = '/index.html';
    }

  } catch (err) {
    errorBox.textContent = Ui.translateError(err.message) || 'Ошибка подключения к серверу';
  }
}

</script>

</body>
</html>
