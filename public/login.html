<!DOCTYPE html>
<html lang="ru" data-page-title-i18n="login.pageTitle">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      width: 340px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin: 0 0 20px;
      text-align: center;
    }

    .lang-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .lang-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #e2e8f0;
      cursor: pointer;
      font-weight: bold;
    }

    .lang-btn.active {
      background: #2563eb;
      color: #fff;
    }

    .mode-switch {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #e2e8f0;
      font-weight: bold;
    }

    .mode-btn.active {
      background: #2563eb;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .error {
      color: red;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 16px;
    }

    .success {
      color: green;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      min-height: 16px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="lang-switch">
    <button type="button" class="lang-btn" data-lang="ru">RU</button>
    <button type="button" class="lang-btn" data-lang="en">EN</button>
    <button type="button" class="lang-btn" data-lang="zh">中文</button>
  </div>

  <div class="mode-switch">
    <button id="modeLoginBtn" type="button" class="mode-btn active" data-i18n="login.tabLogin">Вход</button>
    <button id="modeRegisterBtn" type="button" class="mode-btn" data-i18n="login.tabRegister">Регистрация</button>
  </div>

  <h2 data-i18n="login.heading">BFC24 CONTROL</h2>

  <div id="error" class="error"></div>
  <div id="success" class="success"></div>

  <div id="loginForm">
    <input id="login_username" data-i18n-placeholder="login.usernamePlaceholder" placeholder="Логин" />
    <input id="login_password" type="password" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Пароль" />

    <button class="submit-btn" type="button" onclick="login()" data-i18n="login.submit">Войти</button>
  </div>

  <div id="registerForm" class="hidden">
    <input id="reg_company" data-i18n-placeholder="login.companyPlaceholder" placeholder="Название компании" />
    <input id="reg_name" data-i18n-placeholder="login.namePlaceholder" placeholder="Имя" />
    <input id="reg_phone" data-i18n-placeholder="login.phonePlaceholder" placeholder="Телефон" />
    <input id="reg_email" data-i18n-placeholder="login.emailPlaceholder" placeholder="Email" />
    <input id="reg_username" data-i18n-placeholder="login.registerUsernamePlaceholder" placeholder="Логин" />
    <input id="reg_password" type="password" data-i18n-placeholder="login.registerPasswordPlaceholder" placeholder="Пароль" />

    <button class="submit-btn" type="button" onclick="register()" data-i18n="login.registerSubmit">Зарегистрироваться</button>
  </div>

</div>

<script src="/js/i18n.js"></script>
<script>
  let currentMode = "login";

  function applyModeState() {
    const isLogin = currentMode === "login";

    document.getElementById("loginForm").classList.toggle("hidden", !isLogin);
    document.getElementById("registerForm").classList.toggle("hidden", isLogin);
    document.getElementById("modeLoginBtn").classList.toggle("active", isLogin);
    document.getElementById("modeRegisterBtn").classList.toggle("active", !isLogin);
  }

  function clearMessages() {
    document.getElementById("error").textContent = "";
    document.getElementById("success").textContent = "";
  }

  function setMode(mode) {
    currentMode = mode === "register" ? "register" : "login";
    clearMessages();
    applyModeState();
  }

  function translateServerError(errorText) {
    if (!errorText) return "";
    if (window.i18n && typeof window.i18n.t === "function") {
      return window.i18n.t(errorText, errorText);
    }
    return errorText;
  }

  async function login() {
    const username = document.getElementById("login_username").value.trim();
    const password = document.getElementById("login_password").value.trim();

    const errorBox = document.getElementById("error");
    clearMessages();

    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!data.ok) {
        errorBox.textContent = translateServerError(data.error);
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));

      if (data.user.role === "owner") {
        window.location.href = "/owner-dashboard.html";
      } else {
        window.location.href = "/index.html";
      }
    } catch (error) {
      errorBox.textContent = window.i18n ? window.i18n.t("common.loginConnectionError") : "Ошибка подключения к серверу";
    }
  }

  async function register() {
    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");

    clearMessages();

    const payload = {
      company_name: document.getElementById("reg_company").value.trim(),
      contact_name: document.getElementById("reg_name").value.trim(),
      phone: document.getElementById("reg_phone").value.trim(),
      email: document.getElementById("reg_email").value.trim(),
      username: document.getElementById("reg_username").value.trim(),
      password: document.getElementById("reg_password").value.trim(),
      full_name: document.getElementById("reg_name").value.trim()
    };

    try {
      const res = await fetch("/self-registration", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!data.ok) {
        errorBox.textContent = translateServerError(data.error);
        return;
      }

      successBox.textContent = window.i18n ? window.i18n.t("login.registerSuccess") : "Регистрация успешна. Теперь войдите.";
      document.getElementById("login_username").value = payload.username;
      setMode("login");
    } catch (error) {
      errorBox.textContent = window.i18n ? window.i18n.t("common.loginConnectionError") : "Ошибка подключения к серверу";
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("modeLoginBtn").addEventListener("click", function () {
      setMode("login");
    });

    document.getElementById("modeRegisterBtn").addEventListener("click", function () {
      setMode("register");
    });

    document.querySelectorAll("[data-lang]").forEach(function (button) {
      button.addEventListener("click", function () {
        if (window.i18n && typeof window.i18n.setLang === "function") {
          window.i18n.setLang(button.getAttribute("data-lang"));
        }
      });
    });

    if (window.i18n && typeof window.i18n.applyTranslations === "function") {
      window.i18n.applyTranslations();
    }

    applyModeState();
  });
</script>

</body>
</html>
