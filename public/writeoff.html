<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>BFC24 CONTROL — Списание</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3eb;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }
    .btn-primary:hover{background:var(--primary-hover)}

    .btn-light{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }

    .card{
      background:var(--card);
      border:1px solid #eef1f5;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .card-title{
      font-size:18px;
      font-weight:700;
      margin:0 0 14px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
      min-width:0;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:700;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#9db8ff;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .autocomplete{
      position:relative;
    }

    .results{
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 6px);
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 18px 40px rgba(15,23,42,.16);
      max-height:280px;
      overflow:auto;
      z-index:1000;
      display:none;
    }

    .result-item{
      padding:12px 14px;
      border-bottom:1px solid #f1f3f7;
      cursor:pointer;
    }

    .result-item:last-child{border-bottom:none}
    .result-item:hover{background:#f8fbff}

    .result-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:4px;
    }

    .result-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }

    .selected-box{
      margin-top:10px;
      padding:12px 14px;
      border:1px dashed #ffd0d0;
      background:#fff8f8;
      border-radius:12px;
      display:none;
    }

    .selected-box.active{
      display:block;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
      white-space:pre-wrap;
    }

    .status.show{display:block}
    .status.error{
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
    .status.success{
      background:#f0fdf4;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.info{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid #e8edf4;
      border-radius:14px;
      padding:14px;
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:800;
    }

    .inline{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:18px;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    @media (max-width: 760px){
      .form-grid,
      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">Списание</div>
      <div class="top-actions">
        <button class="btn btn-light" onclick="goBack()">Назад</button>
        <button class="btn btn-light" onclick="logout()">Выйти</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Новое списание</h2>
      <div class="muted">Выбери товар, место хранения, количество и укажи обязательный комментарий.</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Товаров загружено</div>
          <div class="stat-value" id="itemsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Мест хранения</div>
          <div class="stat-value" id="locationsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Tenant ID</div>
          <div class="stat-value" id="tenantValue">1</div>
        </div>
      </div>

      <div id="pageStatus" class="status info"></div>

      <form id="writeoffForm" autocomplete="off">
        <div class="form-grid" style="margin-top:18px;">
          <div class="field full">
            <label for="itemSearch">Товар</label>
            <div class="autocomplete">
              <input
                id="itemSearch"
                type="text"
                placeholder="Начни вводить название, штрихкод, SKU или артикул"
                autocomplete="off"
              />
              <div id="itemResults" class="results"></div>
            </div>
            <div id="selectedItemBox" class="selected-box"></div>
          </div>

          <div class="field">
            <label for="locationId">Место хранения</label>
            <select id="locationId">
              <option value="">Выберите МХ</option>
            </select>
          </div>

          <div class="field">
            <label for="qty">Количество</label>
            <input id="qty" type="number" min="1" step="1" value="1" />
          </div>

          <div class="field full">
            <label for="comment">Комментарий</label>
            <textarea id="comment" placeholder="Например: брак, повреждение, пересорт, утеря"></textarea>
            <div class="hint">Комментарий обязателен.</div>
          </div>
        </div>

        <div class="inline">
          <button type="submit" class="btn btn-primary">Провести списание</button>
          <button type="button" class="btn btn-light" id="refreshBtn">Обновить данные</button>
        </div>
      </form>

      <div id="submitStatus" class="status"></div>
    </div>
  </div>

    <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app-ui.js"></script>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "/login.html";
    }

    const Ui = window.AppUI || {
      escapeHtml: (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;"),
      translateError: (value) => String(value || "Ошибка"),
      displayDateTime: (value) => {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("ru-RU");
      }
    };

    async function requestFallback(method, path, body) {
      const token = localStorage.getItem("token") || "";
      const response = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: "Bearer " + token } : {})
        },
        ...(body !== undefined ? { body: JSON.stringify(body) } : {})
      });

      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { raw: text };
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || ("HTTP " + response.status));
      }

      return data;
    }

    function getTenantIdFromStorage(fallback = 1) {
      try {
        const raw = localStorage.getItem("user");
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.tenant_id !== null && user.tenant_id !== undefined && user.tenant_id !== "") {
          return Number(user.tenant_id);
        }
      } catch {}
      return fallback;
    }

    const ApiBridge = {
      getTenantId(fallback = 1) {
        if (window.API && typeof window.API.getTenantId === "function") {
          const tenantId = window.API.getTenantId();
          if (tenantId !== null && tenantId !== undefined && tenantId !== "") {
            return Number(tenantId);
          }
        }
        return getTenantIdFromStorage(fallback);
      },
      get(path) {
        if (window.API && typeof window.API.get === "function") {
          return window.API.get(path);
        }
        return requestFallback("GET", path);
      },
      post(path, body) {
        if (window.API && typeof window.API.post === "function") {
          return window.API.post(path, body);
        }
        return requestFallback("POST", path, body);
      },
      put(path, body) {
        if (window.API && typeof window.API.put === "function") {
          return window.API.put(path, body);
        }
        return requestFallback("PUT", path, body);
      },
      patch(path, body) {
        if (window.API && typeof window.API.patch === "function") {
          return window.API.patch(path, body);
        }
        return requestFallback("PATCH", path, body);
      },
      delete(path) {
        if (window.API && typeof window.API.delete === "function") {
          return window.API.delete(path);
        }
        return requestFallback("DELETE", path);
      }
    };

    let authUser = null;
    let allItems = [];
    let allLocations = [];
    let selectedItem = null;

    const els = {
      itemSearch: document.getElementById("itemSearch"),
      itemResults: document.getElementById("itemResults"),
      selectedItemBox: document.getElementById("selectedItemBox"),
      locationId: document.getElementById("locationId"),
      qty: document.getElementById("qty"),
      comment: document.getElementById("comment"),
      itemsCount: document.getElementById("itemsCount"),
      locationsCount: document.getElementById("locationsCount"),
      tenantValue: document.getElementById("tenantValue"),
      pageStatus: document.getElementById("pageStatus"),
      submitStatus: document.getElementById("submitStatus"),
      refreshBtn: document.getElementById("refreshBtn"),
      writeoffForm: document.getElementById("writeoffForm")
    };

    function goBack() {
      window.location.href = "/index.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function parseUser() {
      try {
        const raw = localStorage.getItem("user");
        authUser = raw ? JSON.parse(raw) : null;
      } catch {
        authUser = null;
      }
    }

    function getTenantId() {
      if (authUser && authUser.tenant_id) return Number(authUser.tenant_id);
      return ApiBridge.getTenantId(1);
    }

    function showStatus(el, text, type = "info") {
      el.className = "status show " + type;
      el.textContent = text;
    }

    function hideStatus(el) {
      el.className = "status";
      el.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractList(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key];
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) return value;
      }

      return [];
    }

    function normalizeItem(item) {
      return {
        id: item.id,
        name: item.name || item.item_name || "",
        sku: item.sku || "",
        barcode: item.barcode || "",
        vendor_code: item.vendor_code || item.article || "",
        raw: item
      };
    }

    function itemSearchText(item) {
      return [
        item.name,
        item.sku,
        item.barcode,
        item.vendor_code
      ]
      .filter(Boolean)
      .join(" ")
      .toLowerCase();
    }
    async function apiGet(path) {
      return ApiBridge.get(path);
    }
    async function apiPost(path, body) {
      return ApiBridge.post(path, body);
    }

    function renderSelectedItem() {
      if (!selectedItem) {
        els.selectedItemBox.classList.remove("active");
        els.selectedItemBox.innerHTML = "";
        return;
      }

      els.selectedItemBox.classList.add("active");
      els.selectedItemBox.innerHTML = `
        <div><strong>Выбран товар:</strong> ${escapeHtml(selectedItem.name || "Без названия")}</div>
        <div class="muted" style="margin-top:6px;">
          ID: ${escapeHtml(String(selectedItem.id ?? ""))}
          ${selectedItem.sku ? " | SKU: " + escapeHtml(selectedItem.sku) : ""}
          ${selectedItem.barcode ? " | ШК: " + escapeHtml(selectedItem.barcode) : ""}
          ${selectedItem.vendor_code ? " | Артикул: " + escapeHtml(selectedItem.vendor_code) : ""}
        </div>
      `;
    }

    function renderItemResults(items) {
      if (!items.length) {
        els.itemResults.innerHTML = `
          <div class="result-item">
            <div class="result-title">Ничего не найдено</div>
            <div class="result-sub">Проверь название, штрихкод, SKU или артикул.</div>
          </div>
        `;
        els.itemResults.style.display = "block";
        return;
      }

      els.itemResults.innerHTML = items.map(item => `
        <div class="result-item" data-id="${escapeHtml(String(item.id))}">
          <div class="result-title">${escapeHtml(item.name || "Без названия")}</div>
          <div class="result-sub">
            ID: ${escapeHtml(String(item.id ?? ""))}
            ${item.sku ? " | SKU: " + escapeHtml(item.sku) : ""}
            ${item.barcode ? " | ШК: " + escapeHtml(item.barcode) : ""}
            ${item.vendor_code ? " | Артикул: " + escapeHtml(item.vendor_code) : ""}
          </div>
        </div>
      `).join("");

      els.itemResults.style.display = "block";

      els.itemResults.querySelectorAll(".result-item[data-id]").forEach(node => {
        node.addEventListener("click", () => {
          const id = String(node.dataset.id);
          const found = allItems.find(x => String(x.id) === id);
          if (found) {
            selectedItem = found;
            els.itemSearch.value = found.name || "";
            els.itemResults.style.display = "none";
            renderSelectedItem();
          }
        });
      });
    }

    function fillLocations() {
      els.locationId.innerHTML =
        `<option value="">Выберите МХ</option>` +
        allLocations.map(loc => `
          <option value="${escapeHtml(String(loc.id))}">
            ${escapeHtml(loc.name || "")}${loc.code ? " (" + escapeHtml(loc.code) + ")" : ""}
          </option>
        `).join("");
    }

    async function loadItems() {
      const tenantId = getTenantId();
      const data = await apiGet(`/items?tenant_id=${tenantId}`);
      allItems = extractList(data, ["items", "data", "rows"]).map(normalizeItem);
      els.itemsCount.textContent = String(allItems.length);
    }

    async function loadLocations() {
      const tenantId = getTenantId();
      const data = await apiGet(`/locations?tenant_id=${tenantId}`);
      allLocations = extractList(data, ["locations", "data", "rows"]);
      els.locationsCount.textContent = String(allLocations.length);
      fillLocations();
    }

    async function loadInitialData() {
      hideStatus(els.pageStatus);

      try {
        showStatus(els.pageStatus, "Загрузка данных...", "info");

        selectedItem = null;
        renderSelectedItem();
        els.itemResults.style.display = "none";
        els.tenantValue.textContent = String(getTenantId());

        await Promise.all([
          loadItems(),
          loadLocations()
        ]);

        showStatus(
          els.pageStatus,
          `Данные загружены.\nТоваров: ${allItems.length}\nМХ: ${allLocations.length}`,
          "success"
        );
      } catch (err) {
        showStatus(els.pageStatus, "Ошибка загрузки данных: " + Ui.translateError(err.message), "error");
      }
    }

    function onItemSearchInput() {
      const q = (els.itemSearch.value || "").trim().toLowerCase();

      if (!q) {
        els.itemResults.style.display = "none";
        return;
      }

      const filtered = allItems
        .filter(item => itemSearchText(item).includes(q))
        .slice(0, 30);

      renderItemResults(filtered);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideStatus(els.submitStatus);

      try {
        const tenantId = getTenantId();

        if (!selectedItem || !selectedItem.id) {
          throw new Error("Выбери товар из списка");
        }

        if (!els.locationId.value) {
          throw new Error("Выбери место хранения");
        }

        const qty = Number(els.qty.value);
        if (!qty || qty <= 0) {
          throw new Error("Количество должно быть больше 0");
        }

        const comment = (els.comment.value || "").trim();
        if (!comment) {
          throw new Error("Комментарий обязателен");
        }

        const body = {
          tenant_id: tenantId,
          item_id: Number(selectedItem.id),
          location_id: Number(els.locationId.value),
          qty,
          comment
        };

        showStatus(els.submitStatus, "Провожу списание...", "info");

        const result = await apiPost("/writeoff", body);

        showStatus(
          els.submitStatus,
          "Списание успешно проведено.\n\n" + JSON.stringify(result, null, 2),
          "success"
        );

        els.qty.value = 1;
        els.comment.value = "";
        els.locationId.value = "";
        els.itemSearch.value = "";
        selectedItem = null;
        renderSelectedItem();
        els.itemResults.style.display = "none";
      } catch (err) {
        showStatus(els.submitStatus, "Ошибка списания: " + Ui.translateError(err.message), "error");
      }
    }

    function bindEvents() {
      els.itemSearch.addEventListener("input", onItemSearchInput);

      els.itemSearch.addEventListener("focus", () => {
        if (els.itemSearch.value.trim()) {
          onItemSearchInput();
        }
      });

      document.addEventListener("click", (e) => {
        const inAutocomplete = e.target.closest(".autocomplete");
        if (!inAutocomplete) {
          els.itemResults.style.display = "none";
        }
      });

      els.refreshBtn.addEventListener("click", loadInitialData);
      els.writeoffForm.addEventListener("submit", handleSubmit);
    }

    function bootstrap() {
      parseUser();
      bindEvents();
      loadInitialData();
    }

    bootstrap();
  </script>
</body>
</html>
